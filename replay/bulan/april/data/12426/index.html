<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Perbaikan</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000000;
      --text-primary: #ffffff;
      --text-muted: #888888;
      --accent: #e8e8e8;
      --border: rgba(255,255,255,0.08);
      --glow: rgba(255,255,255,0.04);
    }

    html, body {
      min-height: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* Subtle grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* Faint radial light at center */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(255,255,255,0.035) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: clamp(1.5rem, 6vw, 3rem) clamp(1.2rem, 5vw, 2.5rem);
      max-width: 580px;
      width: 100%;
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* Rotating border ring */
    .icon-ring {
      width: 64px;
      height: 64px;
      margin: 0 auto 2.2rem;
      position: relative;
    }

    .icon-ring svg {
      width: 64px;
      height: 64px;
      animation: spinSlow 8s linear infinite;
    }

    .icon-ring .inner-dot {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-ring .inner-dot span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #fff;
      animation: pulse 2s ease-in-out infinite;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.8rem, 11vw, 6rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 0.95;
      color: var(--text-primary);
      /* Subtle text gradient for depth */
      background: linear-gradient(170deg, #ffffff 40%, rgba(255,255,255,0.55) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.05em;
      animation: fadeUp 0.9s 0.1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* Italic tagline kecil di bawah judul */
    .subtitle-tag {
      display: block;
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(0.7rem, 2vw, 0.8rem);
      font-weight: 300;
      font-style: italic;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-top: 0.6rem;
      animation: fadeUp 0.9s 0.18s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: var(--border);
      margin: 2rem auto;
      animation: expandLine 0.8s 0.3s ease both;
    }

    .info-box {
      background: var(--glow);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: clamp(1.1rem, 4vw, 1.6rem) clamp(1.2rem, 5vw, 2rem);
      margin-bottom: 2.2rem;
      animation: fadeUp 0.9s 0.25s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .info-box p {
      font-size: clamp(0.82rem, 2.2vw, 0.93rem);
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.75;
    }

    .info-box p strong {
      color: var(--accent);
      font-weight: 400;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1rem;
      font-size: clamp(0.68rem, 1.8vw, 0.78rem);
      color: #555;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #f0a500;
      animation: blink 1.5s ease-in-out infinite;
    }

    .btn-x {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      background: #fff;
      color: #000;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(0.82rem, 2.2vw, 0.9rem);
      font-weight: 400;
      padding: clamp(0.7rem, 2.5vw, 0.8rem) clamp(1.3rem, 5vw, 1.8rem);
      border-radius: 100px;
      letter-spacing: 0.02em;
      min-height: 44px; /* accessible tap target */
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.9s 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .btn-x:hover {
      background: #e8e8e8;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255,255,255,0.08);
    }

    .btn-x:active {
      transform: translateY(0);
      background: #d4d4d4;
    }

    .btn-x svg {
      width: 16px;
      height: 16px;
      fill: #000;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes expandLine {
      from { width: 0; opacity: 0; }
      to   { width: 32px; opacity: 1; }
    }

    @keyframes spinSlow {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Icon ring -->
    <div class="icon-ring">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="28" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
        <circle cx="32" cy="32" r="28" stroke="rgba(255,255,255,0.5)" stroke-width="1"
          stroke-dasharray="20 160" stroke-linecap="round"/>
      </svg>
      <div class="inner-dot"><span></span></div>
    </div>

    <!-- Heading -->
    <h1>Perbaikan</h1>
    <span class="subtitle-tag">Maintenance &amp; Update</span>

    <div class="divider"></div>

    <!-- Info box -->
    <div class="info-box">
      <p>
        Layanan sedang dalam proses <strong>pemeliharaan & perbaikan</strong>.<br/>
        Kami bekerja untuk memastikan semua sistem kembali berjalan dengan optimal.
      </p>
      <p style="margin-top:0.75rem">
        Mohon bersabar dan pantau terus pembaruan terbaru melalui akun resmi kami.
      </p>
      <div class="status-row">
        <span class="status-dot"></span>
        Dalam pengerjaan
      </div>
    </div>

    <!-- Twitter / X button -->
    <a href="https://x.com/48replay" target="_blank" rel="noopener noreferrer" class="btn-x">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.745l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.91-5.622Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
      Ikuti @48replay di X
    </a>

  </div>
</body>
</html>
