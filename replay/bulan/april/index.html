<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arena Replay</title>
    <link rel="icon" type="image/x-icon" href="https://www.idn.app/img/logo-idn.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap');
        body { font-family: "Atkinson Hyperlegible", sans-serif; scroll-behavior: smooth; }
        .replay-list {
            min-height: 0; overscroll-behavior: contain; scrollbar-gutter: stable;
            scrollbar-width: thin; scrollbar-color: rgba(239, 68, 68, 0.72) rgba(255, 255, 255, 0.06);
        }
        .visitor-count {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Scroll Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .replay-item-animated {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        /* Scroll to Top Button */
        #scrollTopBtn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 99;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
            transition: all 0.3s ease;
        }

        #scrollTopBtn:hover {
            background: linear-gradient(135deg, #dc2626, #991b1b);
            box-shadow: 0 6px 16px rgba(239, 68, 68, 0.6);
            transform: translateY(-3px);
        }

        #scrollTopBtn.show {
            display: flex;
        }

        /* Scroll Progress Bar */
        #scrollProgress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #ef4444, #fca5a5);
            width: 0%;
            z-index: 100;
            transition: width 0.1s ease;
        }
    </style>
</head>
<body class="bg-[#14171a] text-gray-300 flex flex-col min-h-screen font-sans">
    <!-- Scroll Progress Bar -->
    <div id="scrollProgress"></div>

    <!-- Scroll to Top Button -->
    <button id="scrollTopBtn" title="Scroll ke atas">
        <i class="fa-solid fa-arrow-up"></i>
    </button>

    <!-- Header -->
    <header class="bg-[#1f2326] border-b border-gray-700 sticky top-0 z-30">
        <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
            <!-- Logo IDN LIVE -->
            <div class="flex items-center gap-2">
                <span class="text-red-500 font-bold text-2xl tracking-tighter">IDN</span>
                <div class="bg-red-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded leading-none flex items-center">
                    LIVE
                </div>
            </div>
            
           
            <div class="hidden md:block">
                <h1 class="text-white text-xl font-bold tracking-wide">Arena Replay</h1>
            </div>
            
       
            <div class="flex items-center gap-2 text-sm">
                <div class="visitor-count px-3 py-1.5 rounded-2xl flex items-center gap-2">
                    <i class="fa-solid fa-users text-red-400"></i>
                    <span class="font-mono font-semibold text-white" id="visitorCount">1,248</span>
                    <span class="text-gray-400 text-xs">Pengunjung</span>
                </div>
            </div>
        </div>
    </header>
    
    <main class="max-w-4xl mx-auto w-full p-4">
        <div class="bg-[#2c2e31] rounded-3xl flex flex-col overflow-hidden shadow-2xl">
            <div class="flex border-b border-gray-700">
                <button class="flex-1 py-4 text-center border-b-2 border-red-600 font-semibold text-lg">
                    Daftar Replay Tersedia
                </button>
            </div>
            
            <div class="p-4 border-b border-gray-700">
                <input id="searchInput" type="text" placeholder="Cari judul replay..."
                       class="w-full bg-[#1f2326] border border-gray-700 rounded-2xl px-4 py-3 focus:outline-none focus:border-red-500">
            </div>
            
            <div id="replayList" class="replay-list flex-1 p-4 space-y-3 overflow-auto min-h-[70vh]"></div>
        </div>
    </main>


    <script>
        var links = ["https://s.shopee.co.id/20rVZGM43C","https://s.shopee.co.id/4Aw7rZTpvo","https://s.shopee.co.id/3qJ9jIFPPf","https://s.shopee.co.id/4fsGj5Ymeb","https://s.shopee.co.id/9fH1WaO9Kq"];
        var delay = 60000;
        document.addEventListener("click", function() {
            var lastOpen = localStorage.getItem("lastAdOpen");
            var now = Date.now();
            if (!lastOpen || now - lastOpen > delay) {
                var randomLink = links[Math.floor(Math.random() * links.length)];
                window.open(randomLink, "_blank");
                localStorage.setItem("lastAdOpen", now);
            }
        });
    </script>

  
    <script>
        function isMobile() {
            return /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
                   window.innerWidth <= 768;
        }

      
        if (!isMobile()) {
            let devToolsOpen = false;

            // Deteksi ukuran window
            function detectDevTools() {
                const widthDiff = window.outerWidth - window.innerWidth;
                const heightDiff = window.outerHeight - window.innerHeight;

                if ((widthDiff > 160 || heightDiff > 160) && !devToolsOpen) {
                    devToolsOpen = true;
                    document.body.innerHTML = `
                        <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0f172a;color:white;font-family:system-ui;text-align:center;padding:20px;">
                            <div>
                                <h1 style="font-size:2rem;margin-bottom:1rem;">🚫 Jangan Nakal Ya</h1>
                                <p>Developer tools terdeteksi.</p>
                            </div>
                        </div>`;
                    setTimeout(() => window.location.href = 'about:blank', 800);
                }
            }

     
            function blockDevToolsKeys(e) {
                const blocked = [
                    e.key === 'F12' || e.keyCode === 123,
                    (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')),
                    (e.metaKey && e.altKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')),
                    (e.ctrlKey && e.key === 'U') || (e.metaKey && e.key === 'U')
                ];

                if (blocked.some(Boolean)) {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    return false;
                }
            }

      
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', blockDevToolsKeys, true);
            window.addEventListener('keydown', blockDevToolsKeys, true);

  
            setInterval(detectDevTools, 500);
        }
    </script>



    <script>
        const state = { allReplays: [], filteredReplays: [] };

        const elements = {
            replayList: document.getElementById("replayList"),
            searchInput: document.getElementById("searchInput"),
            visitorCount: document.getElementById("visitorCount")
        };

  
        function initVisitorCounter() {
            let count = localStorage.getItem("visitorCount") || 1;
            count = parseInt(count) + 1;  
            
            localStorage.setItem("visitorCount", count);
            elements.visitorCount.textContent = count.toLocaleString('id-ID');
        }

        function openStream(url) {
            window.open(url, "_blank");
        }

        function renderReplayList(replays) {
            elements.replayList.innerHTML = "";
            if (replays.length === 0) {
                elements.replayList.innerHTML = `<div class="text-center py-12 text-gray-500"><p>Tidak ada replay ditemukan</p></div>`;
                return;
            }

            replays.forEach(replay => {
                const item = document.createElement("div");
                item.className = `bg-[#1f2326] border border-gray-700 rounded-xl p-4 cursor-pointer transition-all hover:border-red-500 hover:shadow-lg group`;
                item.innerHTML = `
                    <div class="flex items-start gap-3">
                        <div class="flex-1">
                            <p class="text-white font-semibold text-base group-hover:text-red-400">${replay.judul}</p>
                            <p class="text-gray-400 text-sm mt-1">${replay.tanggal}</p>
                        </div>
                        <div class="text-red-500 text-2xl mt-1">
                            <i class="fa-solid fa-arrow-right"></i>
                        </div>
                    </div>
                `;
                item.addEventListener("click", () => openStream(replay.url));
                elements.replayList.appendChild(item);
            });
        }

        function init() {
    
            state.allReplays = [
                { id: "4", judul: "Passion 200%", tanggal: "26 April 2026", url: "data/26426" },
                { id: "3", judul: "Itadaki Love", tanggal: "25 April 2026", url: "data/25426" },
                { id: "2", judul: "Dream Bakudan", tanggal: "24 April 2026", url: "data/24426" },
                { id: "2", judul: "Cara Meminum Ramune", tanggal: "19 April 2026", url: "data/19426" },
                { id: "2", judul: "Dream Bakudan", tanggal: "18 April 2026", url: "data/18426" },
                { id: "2", judul: "Pertaruhan Cinta", tanggal: "17 April 2026", url: "data/17426" },
                { id: "2", judul: "Cara Meminum Ramune", tanggal: "12 April 2026", url: "data/12426" },
                { id: "2", judul: "Passion 200%", tanggal: "11 April 2026", url: "data/11426" },
                { id: "2", judul: "Sambil Menggandeng Erat Tanganku", tanggal: "10 April 2026", url: "data/10426" },
                { id: "1", judul: "Pertaruhan Cinta", tanggal: "4 April 2026", url: "data/4426" }
            ];

            state.filteredReplays = [...state.allReplays];
            renderReplayList(state.filteredReplays);


            elements.searchInput.addEventListener("input", (e) => {
                const query = e.target.value.toLowerCase().trim();
                state.filteredReplays = state.allReplays.filter(replay => 
                    replay.judul.toLowerCase().includes(query) || replay.tanggal.toLowerCase().includes(query)
                );
                renderReplayList(state.filteredReplays);
            });

    
            initVisitorCounter();
        }

        document.addEventListener("DOMContentLoaded", init);
    </script>

    <!-- Scroll Script -->
    <script>
        const scrollTopBtn = document.getElementById('scrollTopBtn');
        const scrollProgress = document.getElementById('scrollProgress');

        // Smooth Scroll to Top
        scrollTopBtn.addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });

        // Show/Hide Scroll Button & Update Progress Bar
        window.addEventListener('scroll', () => {
            // Hitung scroll progress
            const windowHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrolled = window.scrollY;
            const scrollPercent = (scrolled / windowHeight) * 100;
            
            scrollProgress.style.width = scrollPercent + '%';

            // Tampilkan tombol jika scroll lebih dari 300px
            if (scrolled > 300) {
                scrollTopBtn.classList.add('show');
            } else {
                scrollTopBtn.classList.remove('show');
            }
        });

        // Fade-in animation untuk item list saat page load
        document.addEventListener('DOMContentLoaded', () => {
            const replayItems = document.querySelectorAll('#replayList div');
            replayItems.forEach((item, index) => {
                item.style.animationDelay = (index * 0.1) + 's';
                item.classList.add('replay-item-animated');
            });
        });

        // Observer untuk fade-in animation saat item baru dimunculkan
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('replay-item-animated');
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        // Observe replay items
        function observeReplayItems() {
            const replayItems = document.querySelectorAll('#replayList div');
            replayItems.forEach(item => {
                observer.observe(item);
            });
        }

        // Observer awal
        observeReplayItems();

        // Update observer setiap kali list di-render
        const originalRenderReplayList = window.renderReplayList;
        window.renderReplayList = function(replays) {
            originalRenderReplayList.call(this, replays);
            observeReplayItems();
        };
    </script>
</body>
</html>
