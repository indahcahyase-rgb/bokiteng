<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arena Replay</title>
    <link rel="icon" type="image/x-icon" href="https://www.idn.app/img/logo-idn.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap');
        body { font-family: "Atkinson Hyperlegible", sans-serif; }
        .player-stage { position: relative; background: #000; aspect-ratio: 16 / 9; }
        .player-overlay {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(180deg, rgba(20,23,26,0.18) 0%, rgba(20,23,26,0.78) 100%);
            transition: opacity 0.25s ease, visibility 0.25s ease; z-index: 20;
        }
        .player-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .overlay-play {
            width: 78px; height: 78px; border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.25); background: rgba(239,68,68,0.92);
            color: #fff; font-size: 1.8rem; box-shadow: 0 24px 50px rgba(0,0,0,0.35);
            transition: all 0.2s ease;
        }
        .overlay-play:hover { transform: scale(1.08); background: rgba(220,38,38,0.98); }
        .iklan-box {
            background: #2c2e31;
            border: 2px dashed #f97316;
            border-radius: 16px;
            padding: 16px;
            margin-top: 20px;
            text-align: center;
            color: #fbbf24;
            font-weight: 600;
        }
        #sproutFrame {
            width: 100%;
            height: 100%;
            position: absolute;
            inset: 0;
            border: none;
            display: none;
        }
    </style>
</head>
<body class="bg-[#14171a] text-gray-300 flex flex-col min-h-screen">
    <header class="bg-[#2c2e31] border-b border-gray-700 sticky top-0 z-30">
        <div class="flex items-center justify-between gap-3 max-w-7xl mx-auto px-4 py-3">
            <a href="#"><img src="https://www.idn.app/_next/static/media/logo_light.d99f40cc.svg" alt="IDN Live" class="h-9"></a>
        </div>
    </header>
    <main class="max-w-5xl mx-auto w-full p-4">
        <div class="player-shell rounded-[28px] overflow-hidden border border-gray-800 shadow-2xl">
            <div class="player-stage" id="playerStage">
                <!-- Sproutvideo iframe, ditampilkan setelah overlay diklik -->
                <iframe
                    id="sproutFrame"
                    allowfullscreen
                    allow="autoplay; fullscreen"
                ></iframe>
                <div id="playerOverlay" class="player-overlay">
                    <button id="overlayPlayButton" class="overlay-play">
                        <i class="fa-solid fa-play"></i>
                    </button>
                </div>
            </div>
        </div>
        <div class="mt-5 px-1">
            <p id="playerStatus" class="uppercase tracking-[0.3em] text-[11px] text-red-400 font-bold">REPLAY READY</p>
            <h1 id="replayTitle" class="text-white text-3xl font-bold">Cara Meminum Ramune</h1>
            <p id="replayDate" class="text-gray-400 text-sm">17 Mei 2026</p>
        </div>
        <div class="iklan-box">
            <a href="https://arenareplay.my.id/" target="_blank">
                <img src="https://i.ibb.co/xSGYwHfv/pasang-iklan-mu-disini-1.png" alt="PASANG IKLAN DISINI" class="w-full h-auto rounded-md">
            </a>
        </div>
    </main>

    <script>
    var links = [
        "https://s.shopee.co.id/9zuR1ePkSi",
        "https://s.shopee.co.id/1qYjImVxbO",
        "https://s.shopee.co.id/8piTdhtvyy",
        "https://s.shopee.co.id/7KtfqzlEXv",
        "https://s.shopee.co.id/gMlupq6qE"
    ];
    var delay = 180000;

    var excludedSelectors = [
        '[data-media-button]',
        '[data-media-slider]',
        'media-time-slider',
        'media-volume-slider',
        'media-play-button',
        'media-fullscreen-button',
        'media-mute-button',
        'media-seek-button',
        'media-tooltip',
        '[data-part="controls"]',
        '[data-controls]'
    ];

    function bukaIklan() {
        var lastOpen = localStorage.getItem("lastAdOpen");
        var now = Date.now();
        if (!lastOpen || (now - parseInt(lastOpen)) > delay) {
            var randomLink = links[Math.floor(Math.random() * links.length)];
            window.open(randomLink, "_blank");
            localStorage.setItem("lastAdOpen", now);
        }
    }

    localStorage.removeItem("lastAdOpen");

    document.addEventListener("click", function(e) {
        var isExcluded = excludedSelectors.some(function(sel) {
            return e.target.closest(sel) !== null;
        });
        if (isExcluded) return;
        bukaIklan();
    });

    function getSproutEmbedUrl() {
        const encoded = "aHR0cHM6Ly92aWRlb3Muc3Byb3V0dmlkZW8uY29tL2VtYmVkL2FhOWFkOWIyMTkxYmVhY2QyMC9jZmM4NTc1NzllNDk0NmM4";
        const url = atob(encoded);
        return url ? url + "?autoPlay=true" : "";
    }

    if (!(/Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768)) {
        let devToolsOpen = false;
        function detectDevTools() {
            const widthDiff = window.outerWidth - window.innerWidth;
            const heightDiff = window.outerHeight - window.innerHeight;
            if ((widthDiff > 160 || heightDiff > 160) && !devToolsOpen) {
                devToolsOpen = true;
                document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0f172a;color:white;font-family:system-ui;text-align:center;padding:20px;"><div><h1 style="font-size:2rem;margin-bottom:1rem;">🚫 Mau ngapain?</h1><p>Developer tools terdeteksi.</p></div></div>`;
                setTimeout(() => window.location.href = 'https://www.youtube.com/watch?v=4ckrU8qqblY', 800);
            }
        }
        function blockDevToolsKeys(e) {
            const blocked = [
                e.key === 'F12' || e.keyCode === 123,
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')),
                (e.metaKey && e.altKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')),
                (e.ctrlKey && e.key === 'U') || (e.metaKey && e.key === 'U')
            ];
            if (blocked.some(Boolean)) {
                e.preventDefault();
                e.stopImmediatePropagation();
                return false;
            }
        }
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', blockDevToolsKeys, true);
        window.addEventListener('keydown', blockDevToolsKeys, true);
        setInterval(detectDevTools, 500);
    }

    document.addEventListener("DOMContentLoaded", function() {
        var overlayBtn = document.getElementById("overlayPlayButton");
        var playerOverlay = document.getElementById("playerOverlay");
        var sproutFrame = document.getElementById("sproutFrame");

        overlayBtn.addEventListener("click", function(e) {
            e.stopPropagation();
            bukaIklan();

            sproutFrame.src = getSproutEmbedUrl();
            sproutFrame.style.display = "block";

            // Sembunyikan overlay
            playerOverlay.classList.add("hidden");
            setTimeout(function() { playerOverlay.remove(); }, 300);
        });

        document.addEventListener("fullscreenchange", function() {
            var inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
            if (inFs) bukaIklan();
        });
        document.addEventListener("webkitfullscreenchange", function() {
            var inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
            if (inFs) bukaIklan();
        });
    });
    </script>
</body>
</html>
