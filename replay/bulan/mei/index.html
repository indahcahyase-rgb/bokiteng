<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arena Replay</title>
    <link rel="icon" type="image/x-icon" href="https://www.idn.app/img/logo-idn.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap');
        
        html {
            scroll-behavior: smooth;
            scroll-padding-top: 80px;
        }

        body { 
            font-family: "Atkinson Hyperlegible", sans-serif;
            overflow-x: hidden;
        }

        .replay-list {
            min-height: 0; 
            overscroll-behavior: contain; 
            scrollbar-gutter: stable;
            scrollbar-width: thin; 
            scrollbar-color: rgba(239, 68, 68, 0.72) rgba(255, 255, 255, 0.06);
        }

        /* Custom scrollbar untuk Chrome/Edge */
        .replay-list::-webkit-scrollbar {
            width: 8px;
        }

        .replay-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .replay-list::-webkit-scrollbar-thumb {
            background: rgba(239, 68, 68, 0.6);
            border-radius: 10px;
            transition: background 0.3s ease;
        }

        .replay-list::-webkit-scrollbar-thumb:hover {
            background: rgba(239, 68, 68, 0.8);
        }

        /* Ensure replay list can scroll properly */
        #replayList {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            will-change: scroll-position;
        }

        #replayList::-webkit-scrollbar {
            width: 8px;
        }

        #replayList::-webkit-scrollbar-track {
            background: transparent;
        }

        #replayList::-webkit-scrollbar-thumb {
            background: rgba(239, 68, 68, 0.5);
            border-radius: 4px;
            transition: background 0.2s ease;
        }

        #replayList::-webkit-scrollbar-thumb:hover {
            background: rgba(239, 68, 68, 0.7);
        }
        .visitor-count {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Scroll Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .replay-item-animated {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        /* Scroll to Top Button */
        #scrollTopBtn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 99;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
            transition: all 0.3s ease;
        }

        #scrollTopBtn:hover {
            background: linear-gradient(135deg, #dc2626, #991b1b);
            box-shadow: 0 6px 16px rgba(239, 68, 68, 0.6);
            transform: translateY(-3px);
        }

        #scrollTopBtn.show {
            display: flex;
        }

        /* Scroll Progress Bar */
        #scrollProgress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #ef4444, #fca5a5);
            width: 0%;
            z-index: 100;
            transition: width 0.1s ease;
        }
    </style>
</head>
<body class="bg-[#14171a] text-gray-300 flex flex-col min-h-screen font-sans">
    <!-- Scroll Progress Bar -->
    <div id="scrollProgress"></div>

    <!-- Scroll to Top Button -->
    <button id="scrollTopBtn" title="Scroll ke atas">
        <i class="fa-solid fa-arrow-up"></i>
    </button>

    <!-- Header -->
    <header class="bg-[#1f2326] border-b border-gray-700 sticky top-0 z-30">
        <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
            <!-- Logo IDN LIVE -->
            <div class="flex items-center gap-2">
                <span class="text-red-500 font-bold text-2xl tracking-tighter">IDN</span>
                <div class="bg-red-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded leading-none flex items-center">
                    LIVE
                </div>
            </div>
            
           
            <div class="hidden md:block">
                <h1 class="text-white text-xl font-bold tracking-wide">Arena Replay</h1>
            </div>
            
       
            <div class="flex items-center gap-2 text-sm">
                <div class="visitor-count px-3 py-1.5 rounded-2xl flex items-center gap-2">
                    <i class="fa-solid fa-users text-red-400"></i>
                    <span class="font-mono font-semibold text-white" id="visitorCount">1,248</span>
                    <span class="text-gray-400 text-xs">Pengunjung</span>
                </div>
            </div>
        </div>
    </header>
    
    <main class="max-w-4xl mx-auto w-full p-4 flex flex-col flex-1">
        <div class="bg-[#2c2e31] rounded-3xl flex flex-col overflow-hidden shadow-2xl h-[85vh]">
            <div class="flex border-b border-gray-700 flex-shrink-0">
                <button class="flex-1 py-4 text-center border-b-2 border-red-600 font-semibold text-lg">
                    Daftar Replay Tersedia
                </button>
            </div>
            
            <div class="p-4 border-b border-gray-700 flex-shrink-0">
                <input id="searchInput" type="text" placeholder="Cari judul replay..."
                       class="w-full bg-[#1f2326] border border-gray-700 rounded-2xl px-4 py-3 focus:outline-none focus:border-red-500">
            </div>
            
            <div id="replayList" class="replay-list flex-1 p-4 space-y-3 overflow-y-auto overflow-x-hidden"></div>
        </div>
    </main>


  
    <script>
        function isMobile() {
            return /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
                   window.innerWidth <= 768;
        }

      
        if (!isMobile()) {
            let devToolsOpen = false;

            // Deteksi ukuran window
            function detectDevTools() {
                const widthDiff = window.outerWidth - window.innerWidth;
                const heightDiff = window.outerHeight - window.innerHeight;

                if ((widthDiff > 160 || heightDiff > 160) && !devToolsOpen) {
                    devToolsOpen = true;
                    document.body.innerHTML = `
                        <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0f172a;color:white;font-family:system-ui;text-align:center;padding:20px;">
                            <div>
                                <h1 style="font-size:2rem;margin-bottom:1rem;">🚫 Jangan Nakal Ya</h1>
                                <p>Developer tools terdeteksi.</p>
                            </div>
                        </div>`;
                    setTimeout(() => window.location.href = 'about:blank', 800);
                }
            }

     
            function blockDevToolsKeys(e) {
                const blocked = [
                    e.key === 'F12' || e.keyCode === 123,
                    (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')),
                    (e.metaKey && e.altKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')),
                    (e.ctrlKey && e.key === 'U') || (e.metaKey && e.key === 'U')
                ];

                if (blocked.some(Boolean)) {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    return false;
                }
            }

      
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', blockDevToolsKeys, true);
            window.addEventListener('keydown', blockDevToolsKeys, true);

  
            setInterval(detectDevTools, 500);
        }
    </script>



    <script>
        const state = { allReplays: [], filteredReplays: [] };

        const elements = {
            replayList: document.getElementById("replayList"),
            searchInput: document.getElementById("searchInput"),
            visitorCount: document.getElementById("visitorCount")
        };

  
        function initVisitorCounter() {
            let count = localStorage.getItem("visitorCount") || 1;
            count = parseInt(count) + 1;  
            
            localStorage.setItem("visitorCount", count);
            elements.visitorCount.textContent = count.toLocaleString('id-ID');
        }

        function openStream(url) {
            window.open(url, "_blank");
        }

        function renderReplayList(replays) {
            elements.replayList.innerHTML = "";
            if (replays.length === 0) {
                elements.replayList.innerHTML = `<div class="text-center py-12 text-gray-500"><p>Tidak ada replay ditemukan</p></div>`;
                return;
            }

            replays.forEach(replay => {
                const item = document.createElement("div");
                item.className = `bg-[#1f2326] border border-gray-700 rounded-xl p-4 cursor-pointer transition-all hover:border-red-500 hover:shadow-lg group`;
                item.innerHTML = `
                    <div class="flex items-start gap-3">
                        <div class="flex-1">
                            <p class="text-white font-semibold text-base group-hover:text-red-400">${replay.judul}</p>
                            <p class="text-gray-400 text-sm mt-1">${replay.tanggal}</p>
                        </div>
                        <div class="text-red-500 text-2xl mt-1">
                            <i class="fa-solid fa-arrow-right"></i>
                        </div>
                    </div>
                `;
                item.addEventListener("click", () => openStream(replay.url));
                elements.replayList.appendChild(item);
            });
        }

        function init() {
    
            state.allReplays = [
                { id: "21", judul: "Pajama Drive", tanggal: "29 Mei 2026", url: "data/29526" },
                { id: "20", judul: "Pertaruhan Cinta", tanggal: "28 Mei 2026", url: "data/28526" },
                { id: "19", judul: "Pajama Drive", tanggal: "24 Mei 2026", url: "data/24526" },
                { id: "18", judul: "Dream Bakudan", tanggal: "21 Mei 2026", url: "data/21526" },
                 { id: "17", judul: "Itadaki Love", tanggal: "20 Mei 2026", url: "data/20526" },
                { id: "16", judul: "PASSION 200%", tanggal: "19 Mei 2026", url: "data/19526" },
                { id: "15", judul: "PASSION 200%", tanggal: "17 Mei 2026", url: "data/172526" },
                { id: "14", judul: "Cara Meminum Ramune", tanggal: "17 Mei 2026", url: "data/171526" },
                { id: "13", judul: "Cara Meminum Ramune", tanggal: "16 Mei 2026", url: "data/162526" },
                { id: "12", judul: "Sambil Menggandeng Erat Tanganku", tanggal: "16 Mei 2026", url: "data/161526" },
                { id: "11", judul: "Pajama Drive", tanggal: "15 Mei 2026", url: "data/15526" },
                { id: "10", judul: "Itadaki Love", tanggal: "14 Mei 2026", url: "data/14526" },
                { id: "9", judul: "Dream Bakudan", tanggal: "10 Mei 2026", url: "data/10526" },
                { id: "8", judul: "Sambil Menggandeng Erat Tangan Ku", tanggal: "9 Mei 2026", url: "data/92526" },
                { id: "7", judul: "Pajama Drive", tanggal: "9 Mei 2026", url: "data/91526" },
                { id: "6", judul: "Itadaki Love STS Michie", tanggal: "8 Mei 2026", url: "data/8526" },
                { id: "5", judul: "Spesial Pocky Pertaruhan Cinta", tanggal: "7 Mei 2026", url: "data/7526" },
                { id: "4", judul: "Pertaruhan Cinta", tanggal: "3 Mei 2026", url: "data/32526" },
                { id: "3", judul: "Pajama Drive", tanggal: "3 Mei 2026", url: "data/31526" },
                { id: "2", judul: "Pajama Drive", tanggal: "2 Mei 2026", url: "data/2526" },
                { id: "1", judul: "Cara Meminum Ramune", tanggal: "1 Mei 2026", url: "data/1526" }
            ];

            state.filteredReplays = [...state.allReplays];
            renderReplayList(state.filteredReplays);


            elements.searchInput.addEventListener("input", (e) => {
                const query = e.target.value.toLowerCase().trim();
                state.filteredReplays = state.allReplays.filter(replay => 
                    replay.judul.toLowerCase().includes(query) || replay.tanggal.toLowerCase().includes(query)
                );
                renderReplayList(state.filteredReplays);
            });

    
            initVisitorCounter();
        }

        document.addEventListener("DOMContentLoaded", init);
    </script>

    <!-- Scroll Script -->
    <script>
        // ===== SCROLL MANAGEMENT =====
        class ScrollManager {
            constructor() {
                this.scrollTopBtn = document.getElementById('scrollTopBtn');
                this.scrollProgress = document.getElementById('scrollProgress');
                this.replayList = document.getElementById('replayList');
                this.isScrolling = false;
                this.scrollTimeout;
                this.lastScrollPercent = 0;
                this.observer = null;
                this.init();
            }

            init() {
                this.setupWindowScrollEvents();
                this.setupReplayListScrollEvents();
                this.setupIntersectionObserver();
                this.setupScrollTopButton();
                this.animateItems();
            }

            setupWindowScrollEvents() {
                // Throttle scroll event untuk performa lebih baik
                let ticking = false;
                
                window.addEventListener('scroll', () => {
                    if (!ticking) {
                        window.requestAnimationFrame(() => {
                            this.handleWindowScroll();
                            ticking = false;
                        });
                        ticking = true;
                    }
                }, { passive: true });
            }

            setupReplayListScrollEvents() {
                // Setup scroll untuk elemen replay list sendiri
                if (this.replayList) {
                    let ticking = false;
                    
                    this.replayList.addEventListener('scroll', () => {
                        if (!ticking) {
                            window.requestAnimationFrame(() => {
                                this.handleListScroll();
                                ticking = false;
                            });
                            ticking = true;
                        }
                    }, { passive: true });
                }
            }

            handleWindowScroll() {
                this.updateProgressBar();
                this.toggleScrollButton();
            }

            handleListScroll() {
                // Handle scroll pada replay list (untuk lazy loading di masa depan)
                const scrolled = this.replayList.scrollTop;
                const scrollHeight = this.replayList.scrollHeight - this.replayList.clientHeight;
                const scrollPercent = scrollHeight > 0 ? (scrolled / scrollHeight) * 100 : 0;
                
                // Animasi items yang terlihat
                this.animateVisibleItems();
            }

            updateProgressBar() {
                const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
                const scrolled = window.scrollY;
                const scrollPercent = scrollHeight > 0 ? (scrolled / scrollHeight) * 100 : 0;
                
                // Hanya update jika ada perubahan signifikan (avoid excessive repaints)
                if (Math.abs(scrollPercent - this.lastScrollPercent) > 0.5) {
                    this.scrollProgress.style.width = scrollPercent + '%';
                    this.lastScrollPercent = scrollPercent;
                }
            }

            toggleScrollButton() {
                const scrolled = window.scrollY;
                
                if (scrolled > 300) {
                    if (!this.scrollTopBtn.classList.contains('show')) {
                        this.scrollTopBtn.classList.add('show');
                    }
                } else {
                    if (this.scrollTopBtn.classList.contains('show')) {
                        this.scrollTopBtn.classList.remove('show');
                    }
                }
            }

            setupScrollTopButton() {
                this.scrollTopBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.scrollTo({
                        top: 0,
                        behavior: 'smooth'
                    });
                });

                // Keyboard shortcut: spacebar + Ctrl untuk scroll ke atas
                document.addEventListener('keydown', (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.code === 'Space') {
                        e.preventDefault();
                        window.scrollTo({
                            top: 0,
                            behavior: 'smooth'
                        });
                    }
                });
            }

            setupIntersectionObserver() {
                const observerOptions = {
                    root: this.replayList,
                    threshold: 0.1,
                    rootMargin: '0px'
                };

                this.observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting && !entry.target.classList.contains('replay-item-animated')) {
                            entry.target.classList.add('replay-item-animated');
                        }
                    });
                }, observerOptions);
            }

            animateItems() {
                const replayItems = document.querySelectorAll('#replayList > div');
                replayItems.forEach((item, index) => {
                    item.style.animationDelay = (index * 0.06) + 's';
                    if (!item.classList.contains('replay-item-animated')) {
                        this.observer.observe(item);
                    }
                });
            }

            animateVisibleItems() {
                const replayItems = document.querySelectorAll('#replayList > div:not(.replay-item-animated)');
                replayItems.forEach((item, index) => {
                    item.style.animationDelay = (index * 0.06) + 's';
                    this.observer.observe(item);
                });
            }

            onListRendered() {
                this.animateItems();
            }
        }

        // Inisialisasi ScrollManager setelah DOM siap
        let scrollManager;
        document.addEventListener('DOMContentLoaded', () => {
            scrollManager = new ScrollManager();
            scrollManager.onListRendered();

            // Update scroll items saat search input berubah
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', function(e) {
                    setTimeout(() => {
                        scrollManager.onListRendered();
                    }, 50);
                });
            }
        });

        // ===== OPTIMASI UNTUK FIREFOX & WEBKIT =====
        // Deteksi browser untuk smooth scroll optimization
        if (typeof CSS !== 'undefined' && CSS.supports('scroll-behavior', 'smooth')) {
            document.documentElement.style.scrollBehavior = 'smooth';
        }

        // Optimasi untuk mobile devices
        if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            document.documentElement.style.scrollBehavior = 'auto';
            document.body.style.webkitOverflowScrolling = 'touch';
        }
    </script>
</body>
</html>
