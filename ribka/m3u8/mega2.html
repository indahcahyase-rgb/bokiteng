<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arena Replay</title>
    <link rel="icon" type="image/x-icon" href="https://www.idn.app/img/logo-idn.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap');
        body { font-family: "Atkinson Hyperlegible", sans-serif; }
        
        .player-stage { 
            position: relative; 
            background: #000; 
            aspect-ratio: 16 / 9; 
            overflow: hidden; 
        }
        
        .player-overlay {
            position: absolute; inset: 0; 
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(180deg, rgba(20,23,26,0.18) 0%, rgba(20,23,26,0.78) 100%);
            transition: opacity 0.25s ease;
            z-index: 30;
        }
        .player-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        
        .overlay-play {
            width: 78px; height: 78px; border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.25); 
            background: rgba(239,68,68,0.92);
            color: #fff; font-size: 1.8rem; 
            box-shadow: 0 24px 50px rgba(0,0,0,0.35);
            transition: all 0.2s ease; cursor: pointer;
        }
        .overlay-play:hover { transform: scale(1.08); background: rgba(220,38,38,0.98); }

        #megaFrame {
            position: absolute; inset: 0; width: 100%; height: 100%;
            border: none; z-index: 10;
        }

        #topShield {
            position: absolute; top: 0; left: 0; right: 0; height: 25%;
            z-index: 35; background: transparent; pointer-events: auto;
        }

        .server-btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .server-btn.active {
            background: #ef4444;
            color: white;
            border-color: #ef4444;
        }
    </style>
</head>
<body class="bg-[#14171a] text-gray-300 flex flex-col min-h-screen">
    <header class="bg-[#2c2e31] border-b border-gray-700 sticky top-0 z-30">
        <div class="flex items-center justify-between gap-3 max-w-7xl mx-auto px-4 py-3">
            <a href="#"><img src="https://www.idn.app/_next/static/media/logo_light.d99f40cc.svg" alt="IDN Live" class="h-9"></a>
        </div>
    </header>
    
    <main class="max-w-5xl mx-auto w-full p-4">
        <div class="player-shell rounded-[28px] overflow-hidden border border-gray-800 shadow-2xl">
            <div class="player-stage" id="playerStage">
                <iframe
                    id="videoFrame"
                    src="https://mega.nz/embed/mtBWgIbD#cqnoLmfsYAOeibh57PfJGiffcKmou1f9BXc979v9haQ"
                    allowfullscreen
                    allow="autoplay; fullscreen"
                    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-presentation"
                ></iframe>
                
                <div id="topShield"></div>
                
                <div id="watermark" style="display:none;">arenareplay.my.id</div>
                
                <div id="playerOverlay" class="player-overlay">
                    <button id="overlayPlayButton" class="overlay-play">
                        <i class="fa-solid fa-play"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Server Selection -->
        <div class="mt-4 flex flex-wrap gap-3 justify-center">
            <button onclick="switchServer(1)" id="server1" class="server-btn active bg-gray-800 border border-gray-600 hover:bg-gray-700">Server 1 - Mega</button>
            <button onclick="switchServer(2)" id="server2" class="server-btn bg-gray-800 border border-gray-600 hover:bg-gray-700">Server 2 - YouTube</button>
            <button onclick="switchServer(3)" id="server3" class="server-btn bg-gray-800 border border-gray-600 hover:bg-gray-700">Server 3</button>
        </div>

        <div class="mt-5 px-1">
            <p class="uppercase tracking-[0.3em] text-[11px] text-red-400 font-bold">REPLAY READY</p>
            <h1 class="text-white text-3xl font-bold">Arena Replay</h1>
        </div>

        <div class="iklan-box mt-6">
            <a href="https://arenareplay.my.id/" target="_blank">
                <img src="https://i.ibb.co/xSGYwHfv/pasang-iklan-mu-disini-1.png" alt="PASANG IKLAN DISINI" class="w-full h-auto rounded-md">
            </a>
        </div>
    </main>

    <script>
        const videoFrame = document.getElementById("videoFrame");
        const topShield = document.getElementById("topShield");
        const playerOverlay = document.getElementById("playerOverlay");
        let currentServer = 1;

        const servers = {
            1: {
                url: "https://mega.nz/embed/mtBWgIbD#cqnoLmfsYAOeibh57PfJGiffcKmou1f9BXc979v9haQ",
                name: "Mega"
            },
            2: {
                url: "https://www.youtube.com/embed/xxxY",
                name: "YouTube"
            },
            3: {
                url: "https://abc.com/embed-placeholder",  // Ganti dengan embed URL Server 3 nanti
                name: "Server 3"
            }
        };

        function switchServer(serverNum) {
            if (currentServer === serverNum) return;

            currentServer = serverNum;
            
            // Update active button
            document.querySelectorAll('.server-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.id === `server${serverNum}`) btn.classList.add('active');
            });

            // Ganti src iframe
            videoFrame.src = servers[serverNum].url;

            // Reset overlay & shield
            playerOverlay.classList.remove("hidden");
            if (topShield) {
                topShield.style.pointerEvents = "auto";
            }
        }

        // Tombol Play Overlay
        function init() {
            const overlayPlayButton = document.getElementById("overlayPlayButton");

            overlayPlayButton.addEventListener("click", function(e) {
                e.stopPropagation();
                playerOverlay.classList.add("hidden");

                // Nonaktifkan shield
                setTimeout(() => {
                    if (topShield) topShield.remove();
                }, 3500);

                videoFrame.focus();

                setTimeout(() => {
                    const rect = videoFrame.getBoundingClientRect();
                    const cx = rect.left + rect.width / 2;
                    const cy = rect.top + rect.height * 0.40;

                    const clickEvent = new MouseEvent("click", {
                        bubbles: true,
                        cancelable: true,
                        view: window,
                        clientX: cx,
                        clientY: cy
                    });
                    videoFrame.dispatchEvent(clickEvent);
                }, 800);
            });
        }

        document.addEventListener("DOMContentLoaded", function() {
            init();
        });

        // Watermark (tetap sama)
        const watermark = document.getElementById('watermark');
        const SHOW_DURATION = 10000;
        const HIDE_DURATION = 3 * 60 * 1000;

        function applyResponsiveStyle() {
            const stage = document.getElementById('playerStage');
            const stageW = stage ? stage.offsetWidth : window.innerWidth;
            const fontSize = Math.max(12, Math.min(22, stageW * 0.035));
            watermark.style.fontSize = fontSize + 'px';
        }

        function getRandomPosition() {
            const stage = document.getElementById('playerStage');
            const stageW = stage ? stage.offsetWidth : window.innerWidth;
            const stageH = stage ? stage.offsetHeight : window.innerHeight;
            const wW = watermark.offsetWidth || 160;
            const wH = watermark.offsetHeight || 24;
            const maxX = Math.max(0, stageW - wW - 10);
            const maxY = Math.max(0, stageH - wH - 10);
            return {
                left: Math.floor(Math.random() * maxX) + 'px',
                top: Math.floor(Math.random() * maxY) + 'px'
            };
        }

        function positionWatermark() {
            const pos = getRandomPosition();
            watermark.style.left = pos.left;
            watermark.style.top = pos.top;
        }

        function showWatermark() {
            applyResponsiveStyle();
            positionWatermark();
            watermark.style.display = 'block';
            setTimeout(() => {
                watermark.style.display = 'none';
                setTimeout(showWatermark, HIDE_DURATION);
            }, SHOW_DURATION);
        }

        window.addEventListener('resize', () => {
            if (watermark.style.display === 'block') {
                applyResponsiveStyle();
                positionWatermark();
            }
        });

        showWatermark();
    </script>
</body>
</html>
