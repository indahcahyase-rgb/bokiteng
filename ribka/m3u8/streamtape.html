<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arena Replay</title>
    <link rel="icon" type="image/x-icon" href="https://www.idn.app/img/logo-idn.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap');
        body { font-family: "Atkinson Hyperlegible", sans-serif; }
        .player-stage { position: relative; background: #000; aspect-ratio: 16 / 9; }
        .player-overlay {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(180deg, rgba(20,23,26,0.18) 0%, rgba(20,23,26,0.78) 100%);
            transition: opacity 0.25s ease, visibility 0.25s ease; z-index: 20;
        }
        .player-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .overlay-play {
            width: 78px; height: 78px; border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.25); background: rgba(239,68,68,0.92);
            color: #fff; font-size: 1.8rem; box-shadow: 0 24px 50px rgba(0,0,0,0.35);
            transition: all 0.2s ease; cursor: pointer;
        }
        .overlay-play:hover { transform: scale(1.08); background: rgba(220,38,38,0.98); }
        .iklan-box {
            background: #2c2e31;
            border: 2px dashed #f97316;
            border-radius: 16px;
            padding: 16px;
            margin-top: 20px;
            text-align: center;
            color: #fbbf24;
            font-weight: 600;
        }
        #mobileTapTarget {
            display: none;
            position: absolute;
            left: 20%;
            top: 25%;
            width: 60%;
            height: 50%;
            z-index: 2147483646;
        }
        #watermark {
            position: absolute;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.6);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            z-index: 2147483647;
            user-select: none;
            white-space: nowrap;
        }
        #replayVideo {
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
            position: absolute;
            inset: 0;
        }
    </style>
</head>
<body class="bg-[#14171a] text-gray-300 flex flex-col min-h-screen">
    <header class="bg-[#2c2e31] border-b border-gray-700 sticky top-0 z-30">
        <div class="flex items-center justify-between gap-3 max-w-7xl mx-auto px-4 py-3">
            <a href="#"><img src="https://www.idn.app/_next/static/media/logo_light.d99f40cc.svg" alt="IDN Live" class="h-9"></a>
        </div>
    </header>
    <main class="max-w-5xl mx-auto w-full p-4">
        <div class="player-shell rounded-[28px] overflow-hidden border border-gray-800 shadow-2xl">
            <div class="player-stage" id="playerStage">

                <!-- SRC LANGSUNG DI HTML — sama persis seperti streamtes.html yang berhasil -->
                <video
                    id="replayVideo"
                    controls
                    preload="metadata"
                    playsinline
                    controlsList="nodownload"
                    poster="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1280 720'%3E%3Crect fill='%23000' width='1280' height='720'/%3E%3C/svg%3E">
                    <source
                        src="https://861087038.tapecontent.net/radosgw/AlvW01XLY9iXyO8/mXgUstAtXwRofJbBdxkeiSC3TeIzzpQb0v5ZhkEPrHzreLBXyvT9hStzSAkTm-j7_jjiehsqDotnY0ONtxurNKyEQ_HWq_3krTQjP40z5Sw7_xcLPE6jvl4kQZaZh0bj-ttRdm8zNcTtUPjM9_FZsJmLc_iP2q4OCdLyYaVgoreKszlTtMU0Pwp3Mimm0aXkzov5BFC--G55yB6cig0XkF_WSnRRXbUgjWlKq-S5Bvd5aCmG7AYMoEN5_n_RhLhgMCF95a8lmW5_yc91bk6py60AYfEfRlY9Xe4ePdoazTGt0daXc20bSQ3chV8JUZvyRrWFeYJa78AvauW/Cara+Meminum+Ramune+-++17+Mei+2026.mp4?stream=1"
                        type="video/mp4">
                    Browser Anda tidak mendukung video.
                </video>

                <div id="mobileTapTarget"></div>
                <div id="watermark" style="display:none;">arenareplay.my.id</div>

                <div id="playerOverlay" class="player-overlay">
                    <button id="overlayPlayButton" class="overlay-play">
                        <i class="fa-solid fa-play"></i>
                    </button>
                </div>
            </div>
        </div>
        <div class="mt-5 px-1">
            <p class="uppercase tracking-[0.3em] text-[11px] text-red-400 font-bold">REPLAY READY</p>
            <h1 class="text-white text-3xl font-bold">Arena Replay</h1>
            <p class="text-gray-400 text-sm">—</p>
        </div>
        <div class="iklan-box">
            <a href="https://arenareplay.my.id/" target="_blank">
                <img src="https://i.ibb.co/xSGYwHfv/pasang-iklan-mu-disini-1.png" alt="PASANG IKLAN DISINI" class="w-full h-auto rounded-md">
            </a>
        </div>
    </main>

    <script>
    // =============================================
    // IKLAN
    // =============================================
    var adLinks = [
        "https://s.shopee.co.id/9zuR1ePkSi",
        "https://s.shopee.co.id/1qYjImVxbO",
        "https://s.shopee.co.id/8piTdhtvyy",
        "https://s.shopee.co.id/7KtfqzlEXv",
        "https://s.shopee.co.id/gMlupq6qE"
    ];
    var adDelay = 180000;

    function bukaIklan() {
        var lastOpen = localStorage.getItem("lastAdOpen");
        var now = Date.now();
        if (!lastOpen || (now - parseInt(lastOpen)) > adDelay) {
            var randomLink = adLinks[Math.floor(Math.random() * adLinks.length)];
            window.open(randomLink, "_blank");
            localStorage.setItem("lastAdOpen", now);
        }
    }

    localStorage.removeItem("lastAdOpen");

    document.addEventListener("DOMContentLoaded", function () {
        var video      = document.getElementById("replayVideo");
        var overlay    = document.getElementById("playerOverlay");
        var overlayBtn = document.getElementById("overlayPlayButton");
        var mobileTap  = document.getElementById("mobileTapTarget");
        var playerStage = document.getElementById("playerStage");

        // Sembunyikan overlay saat play
        var overlayGone = false;
        function hideOverlay() {
            if (overlayGone) return;
            overlayGone = true;
            overlay.classList.add("hidden");
            setTimeout(function () {
                if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
            }, 300);
        }

        video.addEventListener("play", hideOverlay);

        // Tombol overlay
        overlayBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            bukaIklan();
            video.play().catch(function () {});
        });

        // Klik area stage (bukan video/kontrol)
        playerStage.addEventListener("click", function (e) {
            if (e.target.closest("video") || e.target.closest("button")) return;
            bukaIklan();
        });

        // Klik area luar player
        document.addEventListener("click", function (e) {
            if (e.target.closest("#playerStage") || e.target.closest(".iklan-box") || e.target.closest("a")) return;
            bukaIklan();
        });

        // Mobile tap target saat fullscreen
        if (mobileTap) {
            mobileTap.addEventListener("touchend", function () { bukaIklan(); }, { passive: true });
            mobileTap.addEventListener("click", function () { bukaIklan(); });
        }

        // Fullscreen
        function onFsChange() {
            var inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
            if (inFs) bukaIklan();
            var isMobile = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768;
            if (mobileTap) mobileTap.style.display = (isMobile && inFs) ? "block" : "none";
        }
        document.addEventListener("fullscreenchange", onFsChange);
        document.addEventListener("webkitfullscreenchange", onFsChange);
        document.addEventListener("mozfullscreenchange", onFsChange);

        // Spasi = play/pause
        document.addEventListener("keydown", function (e) {
            if ((e.code === "Space" || e.key === " ") && document.activeElement.tagName !== "INPUT") {
                e.preventDefault();
                video.paused ? video.play().catch(function () {}) : video.pause();
            }
        }, true);

        // =============================================
        // WATERMARK
        // =============================================
        var watermark    = document.getElementById("watermark");
        var SHOW_DUR     = 10000;
        var HIDE_DUR     = 3 * 60 * 1000;
        var wmHideT, wmShowT, wmActive = false;

        function applyWmStyle() {
            var inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
            watermark.style.fontSize = inFs ? "1.4rem" : "0.85rem";
        }
        function positionWm() {
            watermark.style.left = (10 + Math.random() * 70) + "%";
            watermark.style.top  = (10 + Math.random() * 70) + "%";
        }
        function showWm() {
            if (!watermark) return;
            applyWmStyle();
            positionWm();
            watermark.style.display = "block";
            wmActive = true;
            wmHideT = setTimeout(function () {
                watermark.style.display = "none";
                wmActive = false;
                wmShowT = setTimeout(showWm, HIDE_DUR);
            }, SHOW_DUR);
        }
        function onFsWm() {
            var inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
            if (inFs) { clearTimeout(wmHideT); clearTimeout(wmShowT); showWm(); }
        }
        document.addEventListener("fullscreenchange", onFsWm);
        document.addEventListener("webkitfullscreenchange", onFsWm);
        document.addEventListener("mozfullscreenchange", onFsWm);
        window.addEventListener("resize", function () {
            if (wmActive) { applyWmStyle(); positionWm(); }
        });

        showWm();
    });

    // =============================================
    // BLOKIR DEVTOOLS (desktop only)
    // =============================================
    if (!(/Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768)) {
        var devOpen = false;
        function detectDevTools() {
            var wd = window.outerWidth - window.innerWidth;
            var hd = window.outerHeight - window.innerHeight;
            if ((wd > 160 || hd > 160) && !devOpen) {
                devOpen = true;
                document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0f172a;color:white;font-family:system-ui;text-align:center;padding:20px;"><div><h1 style="font-size:2rem;margin-bottom:1rem;">🚫 Mau ngapain?</h1><p>Developer tools terdeteksi.</p></div></div>';
                setTimeout(function () { window.location.href = "https://www.youtube.com/watch?v=4ckrU8qqblY"; }, 800);
            }
        }
        function blockKeys(e) {
            var blocked = [
                e.key === "F12" || e.keyCode === 123,
                (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key)),
                (e.metaKey && e.altKey && ["I","J","C"].includes(e.key)),
                (e.ctrlKey || e.metaKey) && e.key === "U"
            ];
            if (blocked.some(Boolean)) { e.preventDefault(); e.stopImmediatePropagation(); return false; }
        }
        document.addEventListener("contextmenu", function (e) { e.preventDefault(); });
        document.addEventListener("keydown", blockKeys, true);
        window.addEventListener("keydown", blockKeys, true);
        setInterval(detectDevTools, 500);
    }
    </script>
</body>
</html>
