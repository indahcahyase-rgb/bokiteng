<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arena Replay</title>
    <link rel="icon" type="image/x-icon" href="https://www.idn.app/img/logo-idn.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap');
        body { font-family: "Atkinson Hyperlegible", sans-serif; }
        .player-stage { position: relative; background: #000; aspect-ratio: 16 / 9; }
        .player-overlay {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(180deg, rgba(20,23,26,0.18) 0%, rgba(20,23,26,0.78) 100%);
            transition: opacity 0.25s ease, visibility 0.25s ease; z-index: 20;
        }
        .player-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .overlay-play {
            width: 78px; height: 78px; border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.25); background: rgba(239,68,68,0.92);
            color: #fff; font-size: 1.8rem; box-shadow: 0 24px 50px rgba(0,0,0,0.35);
            transition: all 0.2s ease;
        }
        .overlay-play:hover { transform: scale(1.08); background: rgba(220,38,38,0.98); }
        .iklan-box {
            background: #2c2e31;
            border: 2px dashed #f97316;
            border-radius: 16px;
            padding: 16px;
            margin-top: 20px;
            text-align: center;
            color: #fbbf24;
            font-weight: 600;
        }
        #mobileTapTarget {
            display: none;
            position: absolute;
            left: 20%;
            top: 25%;
            width: 60%;
            height: 50%;
            z-index: 2147483646;
        }
        #watermark {
            position: absolute;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.6);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            z-index: 2147483647;
            user-select: none;
            white-space: nowrap;
        }
        #replayVideo {
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
        }
    </style>
</head>
<body class="bg-[#14171a] text-gray-300 flex flex-col min-h-screen">
    <header class="bg-[#2c2e31] border-b border-gray-700 sticky top-0 z-30">
        <div class="flex items-center justify-between gap-3 max-w-7xl mx-auto px-4 py-3">
            <a href="#"><img src="https://www.idn.app/_next/static/media/logo_light.d99f40cc.svg" alt="IDN Live" class="h-9"></a>
        </div>
    </header>
    <main class="max-w-5xl mx-auto w-full p-4">
        <div class="player-shell rounded-[28px] overflow-hidden border border-gray-800 shadow-2xl">
            <div class="player-stage" id="playerStage">
                <video id="replayVideo"
                       playsinline
                       controls
                       preload="metadata">
                </video>
                <div id="mobileTapTarget"></div>
                <div id="watermark" style="display:none;">arenareplay.my.id</div>
                <div id="playerOverlay" class="player-overlay">
                    <button id="overlayPlayButton" class="overlay-play">
                        <i class="fa-solid fa-play"></i>
                    </button>
                </div>
            </div>
        </div>
        <div class="mt-5 px-1">
            <p id="playerStatus" class="uppercase tracking-[0.3em] text-[11px] text-red-400 font-bold">REPLAY READY</p>
            <h1 id="replayTitle" class="text-white text-3xl font-bold">TESTING 002</h1>
            <p id="replayDate" class="text-gray-400 text-sm">—</p>
        </div>
        <div class="iklan-box">
            <a href="https://arenareplay.my.id/" target="_blank">
                <img src="https://i.ibb.co/xSGYwHfv/pasang-iklan-mu-disini-1.png" alt="PASANG IKLAN DISINI" class="w-full h-auto rounded-md">
            </a>
        </div>
    </main>

    <script>
    var links = [
        "https://s.shopee.co.id/9zuR1ePkSi",
        "https://s.shopee.co.id/1qYjImVxbO",
        "https://s.shopee.co.id/8piTdhtvyy",
        "https://s.shopee.co.id/7KtfqzlEXv",
        "https://s.shopee.co.id/gMlupq6qE"
    ];
    var delay = 180000;

    var excludedSelectors = [
        'video',
        '#replayVideo',
        '[controls]',
        'button',
        'a'
    ];

    function bukaIklan() {
        var lastOpen = localStorage.getItem("lastAdOpen");
        var now = Date.now();
        if (!lastOpen || (now - parseInt(lastOpen)) > delay) {
            var randomLink = links[Math.floor(Math.random() * links.length)];
            window.open(randomLink, "_blank");
            localStorage.setItem("lastAdOpen", now);
        }
    }

    localStorage.removeItem("lastAdOpen");

    document.addEventListener("click", function(e) {
        var isExcluded = excludedSelectors.some(function(sel) {
            return e.target.closest(sel) !== null;
        });
        if (isExcluded) return;
        bukaIklan();
    });

    document.addEventListener("DOMContentLoaded", function() {
        // Decode URL video
        function decodeVideoUrl() {
            const encoded = "aHR0cHM6Ly84NjEwODcwMzgudGFwZWNvbnRlbnQubmV0L3JhZG9zZ3cvQWx2VzAxWExZOWlYeU84L21YZ1VzdEF0WHdSb2ZKYkJkeGtlaVNDM1RlSXp6cFFiMHY1WmhrRVBySHplckxCWHl2VDloc3R6U0FrVG0tajdfamppZWhzcURvdG5ZME9OdHh1ck5LeUVRX0hXcV8za3JUUUpQNDB6NVN3N194Y0xQRTZqdmw0a1FaYVpoMGJqLXR0UmRtOHpOY1R0VVBqTTlfRlpzSm1MY19pUDJxNE9DZEx5WWFWZm9yZUtzekxUdE1VMFBvcDNNaW1tMGFYa3pvdjVCRkMtLUc1NXlCNmNpZzBYa0ZfV1NuUlJiVWdqV2xLcS1TNUJlZDVhQ21HN0FZTW9FTjVfbl9SaExoZ01DRjk1YThsbVc1X3ljOTFiazZweTYwQVlmRWZSbFk5WGU0ZVBkb2F6VEd0MGRhWGMyMGJTUTNjaFY4SlVadnlSclhXRmVZSmE3OEF2YXVXL0NhcmErTWVtaW51bStSYW11bmUrLSsrMTcrTWVpKzIwMjYubXA0P3N0cmVhbT0x";
            return atob(encoded);
        }

        var video = document.getElementById("replayVideo");
        var overlay = document.getElementById("playerOverlay");
        var overlayBtn = document.getElementById("overlayPlayButton");
        var mobileTap = document.getElementById("mobileTapTarget");
        var playerStage = document.getElementById("playerStage");

        // Set src MP4 langsung ke elemen <video>
        video.src = decodeVideoUrl();

        // Sembunyikan overlay saat video mulai play
        var overlayRemoved = false;
        function removeOverlay() {
            if (!overlayRemoved) {
                overlayRemoved = true;
                overlay.classList.add("hidden");
                setTimeout(function() { overlay.remove(); }, 300);
            }
        }

        video.addEventListener("play", removeOverlay);

        // Tombol overlay play
        overlayBtn.addEventListener("click", function(e) {
            e.stopPropagation();
            bukaIklan();
            video.play().catch(function() {});
        });

        // Klik area player (bukan kontrol video)
        playerStage.addEventListener("click", function(e) {
            if (e.target === video || e.target.closest('button') || e.target.closest('[controls]')) return;
            bukaIklan();
        });

        // Mobile tap target saat fullscreen
        if (mobileTap) {
            mobileTap.addEventListener("touchend", function(e) {
                bukaIklan();
            }, { passive: true });
            mobileTap.addEventListener("click", function(e) {
                bukaIklan();
            });
        }

        // Buka iklan saat masuk fullscreen
        function onFullscreenChange() {
            var inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
            if (inFs) bukaIklan();
            // Tampilkan mobileTapTarget saat fullscreen di mobile
            var isMobile = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768;
            if (mobileTap) {
                mobileTap.style.display = (isMobile && inFs) ? 'block' : 'none';
            }
        }

        document.addEventListener("fullscreenchange", onFullscreenChange);
        document.addEventListener("webkitfullscreenchange", onFullscreenChange);
        document.addEventListener("mozfullscreenchange", onFullscreenChange);

        // Spasi untuk play/pause
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault();
                video.paused ? video.play().catch(function(){}) : video.pause();
            }
        }, true);
    });

    // Blokir devtools (desktop only)
    if (!(/Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768)) {
        let devToolsOpen = false;
        function detectDevTools() {
            const widthDiff = window.outerWidth - window.innerWidth;
            const heightDiff = window.outerHeight - window.innerHeight;
            if ((widthDiff > 160 || heightDiff > 160) && !devToolsOpen) {
                devToolsOpen = true;
                document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0f172a;color:white;font-family:system-ui;text-align:center;padding:20px;"><div><h1 style="font-size:2rem;margin-bottom:1rem;">🚫 Mau ngapain?</h1><p>Developer tools terdeteksi.</p></div></div>`;
                setTimeout(() => window.location.href = 'https://www.youtube.com/watch?v=4ckrU8qqblY', 800);
            }
        }
        function blockDevToolsKeys(e) {
            const blocked = [
                e.key === 'F12' || e.keyCode === 123,
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')),
                (e.metaKey && e.altKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')),
                (e.ctrlKey && e.key === 'U') || (e.metaKey && e.key === 'U')
            ];
            if (blocked.some(Boolean)) {
                e.preventDefault();
                e.stopImmediatePropagation();
                return false;
            }
        }
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', blockDevToolsKeys, true);
        window.addEventListener('keydown', blockDevToolsKeys, true);
        setInterval(detectDevTools, 500);
    }

    // Watermark
    const watermark = document.getElementById('watermark');
    const SHOW_DURATION = 10000;
    const HIDE_DURATION = 3 * 60 * 1000;
    let watermarkHideTimeout, watermarkTimeout, isWatermarkActive = false;

    function applyResponsiveStyle() { /* ... sama seperti kode asli ... */ }
    function getRandomPosition() { /* ... sama ... */ }
    function positionWatermark() { /* ... sama ... */ }
    function showWatermark() { /* ... sama ... */ }
    function onFullscreenChangeWatermark() { /* ... sama ... */ }

    document.addEventListener('fullscreenchange', onFullscreenChangeWatermark);
    document.addEventListener('webkitfullscreenchange', onFullscreenChangeWatermark);
    document.addEventListener('mozfullscreenchange', onFullscreenChangeWatermark);
    window.addEventListener('resize', () => {
        if (isWatermarkActive) {
            applyResponsiveStyle();
            positionWatermark();
        }
    });

    showWatermark();
    </script>
</body>
</html>
