<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arena Replay</title>
    <link rel="icon" type="image/x-icon" href="https://www.idn.app/img/logo-idn.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap');
        body { font-family: "Atkinson Hyperlegible", sans-serif; }
        .player-stage { position: relative; background: #000; aspect-ratio: 16 / 9; }
        .player-overlay {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(180deg, rgba(20,23,26,0.18) 0%, rgba(20,23,26,0.78) 100%);
            transition: opacity 0.25s ease, visibility 0.25s ease; z-index: 20;
        }
        .player-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .overlay-play {
            width: 78px; height: 78px; border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.25); background: rgba(239,68,68,0.92);
            color: #fff; font-size: 1.8rem; box-shadow: 0 24px 50px rgba(0,0,0,0.35);
            transition: all 0.2s ease; cursor: pointer;
        }
        .overlay-play:hover { transform: scale(1.08); background: rgba(220,38,38,0.98); }
        .iklan-box {
            background: #2c2e31;
            border: 2px dashed #f97316;
            border-radius: 16px;
            padding: 16px;
            margin-top: 20px;
            text-align: center;
            color: #fbbf24;
            font-weight: 600;
        }
        #mobileTapTarget {
            display: none;
            position: absolute;
            left: 20%;
            top: 25%;
            width: 60%;
            height: 50%;
            z-index: 2147483646;
        }
        #watermark {
            position: absolute;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.6);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            z-index: 2147483647;
            user-select: none;
            white-space: nowrap;
        }
        #replayVideo {
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
            position: absolute;
            inset: 0;
        }

        /* Custom Controls */
        .video-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.85) 100%);
            padding: 20px 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .controls-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .player-stage:hover .video-controls,
        .video-controls.visible {
            opacity: 1;
        }
        .control-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s ease;
            flex-shrink: 0;
        }
        .control-btn:hover { opacity: 0.75; }

        /* Progress bar */
        .progress-wrap {
            flex: 1;
            padding: 6px 0;
            cursor: pointer;
            position: relative;
        }
        .progress-track {
            height: 4px;
            background: rgba(255,255,255,0.25);
            border-radius: 2px;
            position: relative;
            transition: height 0.15s ease;
        }
        .progress-wrap:hover .progress-track { height: 6px; }
        .progress-fill {
            height: 100%;
            background: #ef4444;
            border-radius: 2px;
            width: 0%;
            pointer-events: none;
        }
        .progress-thumb {
            position: absolute;
            top: 50%;
            width: 12px;
            height: 12px;
            background: #ef4444;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.15s;
            pointer-events: none;
        }
        .progress-wrap:hover .progress-thumb { opacity: 1; }

        .time-display {
            color: #fff;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* Volume */
        .volume-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .volume-slider-wrap {
            width: 0;
            overflow: hidden;
            transition: width 0.25s ease;
        }
        .volume-wrap:hover .volume-slider-wrap,
        .volume-wrap.expanded .volume-slider-wrap {
            width: 64px;
        }
        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 64px;
            height: 4px;
            background: rgba(255,255,255,0.25);
            border-radius: 2px;
            cursor: pointer;
            outline: none;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 12px;
            background: #ef4444;
            border-radius: 50%;
            cursor: pointer;
        }
        .volume-slider::-moz-range-thumb {
            width: 12px; height: 12px;
            background: #ef4444;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        /* Settings menu */
        .settings-menu {
            position: absolute;
            bottom: 60px;
            right: 12px;
            background: rgba(20,20,20,0.95);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            padding: 8px 0;
            min-width: 200px;
            z-index: 200;
            display: none;
        }
        .settings-menu.open { display: block; }
        .settings-item {
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .settings-item:hover { background: rgba(255,255,255,0.08); }
        .settings-item span:first-child { color: #aaa; margin-right: 12px; }
        .settings-item span:last-child { font-weight: 600; }
        .settings-divider {
            height: 1px;
            background: rgba(255,255,255,0.08);
            margin: 4px 0;
        }
        .settings-header {
            padding: 6px 16px 10px;
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* Speed submenu */
        .speed-options {
            display: none;
            padding: 4px 0;
        }
        .speed-options.open { display: block; }
        .speed-option {
            padding: 8px 24px;
            color: #ccc;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.15s;
        }
        .speed-option:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .speed-option.active { color: #ef4444; }
        .speed-option .check-icon { font-size: 11px; opacity: 0; }
        .speed-option.active .check-icon { opacity: 1; }

        /* Buffered bar */
        .progress-buffer {
            position: absolute;
            top: 0; left: 0;
            height: 100%;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            width: 0%;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-[#14171a] text-gray-300 flex flex-col min-h-screen">
    <header class="bg-[#2c2e31] border-b border-gray-700 sticky top-0 z-30">
        <div class="flex items-center justify-between gap-3 max-w-7xl mx-auto px-4 py-3">
            <a href="#"><img src="https://www.idn.app/_next/static/media/logo_light.d99f40cc.svg" alt="IDN Live" class="h-9"></a>
        </div>
    </header>
    <main class="max-w-5xl mx-auto w-full p-4">
        <div class="player-shell rounded-[28px] overflow-hidden border border-gray-800 shadow-2xl">
            <div class="player-stage" id="playerStage">

                <video
                    id="replayVideo"
                    preload="metadata"
                    playsinline
                    controlsList="nodownload"
                    poster="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1280 720'%3E%3Crect fill='%23000' width='1280' height='720'/%3E%3C/svg%3E">
                    <source id="videoSource" src="" type="video/mp4">
                    Browser Anda tidak mendukung video.
                </video>

                <!-- Settings Menu -->
                <div class="settings-menu" id="settingsMenu">
                    <div class="settings-header">Pengaturan</div>
                    <div class="settings-divider"></div>
                    <div class="settings-item" id="speedMenuToggle">
                        <span>Kecepatan</span>
                        <span id="currentSpeedLabel">1×</span>
                    </div>
                    <div class="speed-options" id="speedOptions">
                        <div class="speed-option" data-speed="0.25">
                            <i class="fa-solid fa-check check-icon"></i>0.25×
                        </div>
                        <div class="speed-option" data-speed="0.5">
                            <i class="fa-solid fa-check check-icon"></i>0.5×
                        </div>
                        <div class="speed-option" data-speed="0.75">
                            <i class="fa-solid fa-check check-icon"></i>0.75×
                        </div>
                        <div class="speed-option active" data-speed="1">
                            <i class="fa-solid fa-check check-icon"></i>Normal (1×)
                        </div>
                        <div class="speed-option" data-speed="1.25">
                            <i class="fa-solid fa-check check-icon"></i>1.25×
                        </div>
                        <div class="speed-option" data-speed="1.5">
                            <i class="fa-solid fa-check check-icon"></i>1.5×
                        </div>
                        <div class="speed-option" data-speed="2">
                            <i class="fa-solid fa-check check-icon"></i>2×
                        </div>
                    </div>
                </div>

                <!-- Custom Video Controls -->
                <div class="video-controls" id="videoControls">
                    <!-- Progress row -->
                    <div class="controls-row">
                        <div class="progress-wrap" id="progressWrap">
                            <div class="progress-track" id="progressTrack">
                                <div class="progress-buffer" id="progressBuffer"></div>
                                <div class="progress-fill" id="progressFill"></div>
                                <div class="progress-thumb" id="progressThumb"></div>
                            </div>
                        </div>
                    </div>
                    <!-- Buttons row -->
                    <div class="controls-row">
                        <button class="control-btn" id="playPauseBtn" title="Play/Pause">
                            <i class="fa-solid fa-play"></i>
                        </button>
                        <!-- Skip backward -->
                        <button class="control-btn" id="skipBackBtn" title="Mundur 10 detik">
                            <i class="fa-solid fa-rotate-left"></i>
                        </button>
                        <!-- Skip forward -->
                        <button class="control-btn" id="skipFwdBtn" title="Maju 10 detik">
                            <i class="fa-solid fa-rotate-right"></i>
                        </button>
                        <!-- Volume -->
                        <div class="volume-wrap" id="volumeWrap">
                            <button class="control-btn" id="volumeBtn" title="Volume">
                                <i class="fa-solid fa-volume-high"></i>
                            </button>
                            <div class="volume-slider-wrap">
                                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="100">
                            </div>
                        </div>
                        <!-- Time -->
                        <div class="time-display" id="timeDisplay">0:00 / 0:00</div>
                        <!-- Spacer -->
                        <div style="flex:1"></div>
                        <!-- Settings -->
                        <button class="control-btn" id="settingsBtn" title="Pengaturan">
                            <i class="fa-solid fa-gear"></i>
                        </button>
                        <!-- Fullscreen -->
                        <button class="control-btn" id="fullscreenBtn" title="Layar Penuh">
                            <i class="fa-solid fa-expand"></i>
                        </button>
                    </div>
                </div>

                <div id="mobileTapTarget"></div>
                <div id="watermark" style="display:none;">arenareplay.my.id</div>

                <div id="playerOverlay" class="player-overlay">
                    <button id="overlayPlayButton" class="overlay-play">
                        <i class="fa-solid fa-play"></i>
                    </button>
                </div>
            </div>
        </div>
        <div class="mt-5 px-1">
            <p id="playerStatus" class="uppercase tracking-[0.3em] text-[11px] text-red-400 font-bold">REPLAY READY</p>
            <h1 id="replayTitle" class="text-white text-3xl font-bold">Cara Meminum Ramune</h1>
            <p id="replayDate" class="text-gray-400 text-sm">17 Mei 2026</p>
        </div>
        <div class="iklan-box">
            <a href="#" target="_blank">
                <img src="https://i.ibb.co/xSGYwHfv/pasang-iklan-mu-disini-1.png" alt="PASANG IKLAN DISINI" class="w-full h-auto rounded-md">
            </a>
        </div>
    </main>

    <script>
    // =============================================
    // IKLAN
    // =============================================
    var adLinks = [
        "https://s.shopee.co.id/9zuR1ePkSi",
        "https://s.shopee.co.id/1qYjImVxbO",
        "https://s.shopee.co.id/8piTdhtvyy",
        "https://s.shopee.co.id/7KtfqzlEXv",
        "https://s.shopee.co.id/gMlupq6qE"
    ];
    var adDelay = 180000;

    function bukaIklan() {
        var lastOpen = localStorage.getItem("lastAdOpen");
        var now = Date.now();
        if (!lastOpen || (now - parseInt(lastOpen)) > adDelay) {
            var randomLink = adLinks[Math.floor(Math.random() * adLinks.length)];
            window.open(randomLink, "_blank");
            localStorage.setItem("lastAdOpen", now);
        }
    }

    localStorage.removeItem("lastAdOpen");

    document.addEventListener("click", function(e) {
        if (e.target.closest('video') || e.target.closest('a') || e.target.closest('.iklan-box')) return;
        bukaIklan();
    });

    // =============================================
    // VIDEO
    // =============================================
    document.addEventListener("DOMContentLoaded", function() {
        var video        = document.getElementById("replayVideo");
        var source       = document.getElementById("videoSource");
        var overlay      = document.getElementById("playerOverlay");
        var overlayBtn   = document.getElementById("overlayPlayButton");
        var mobileTap    = document.getElementById("mobileTapTarget");
        var playerStage  = document.getElementById("playerStage");

        // Controls elements
        var playPauseBtn   = document.getElementById("playPauseBtn");
        var skipBackBtn    = document.getElementById("skipBackBtn");
        var skipFwdBtn     = document.getElementById("skipFwdBtn");
        var volumeBtn      = document.getElementById("volumeBtn");
        var volumeSlider   = document.getElementById("volumeSlider");
        var volumeWrap     = document.getElementById("volumeWrap");
        var progressWrap   = document.getElementById("progressWrap");
        var progressFill   = document.getElementById("progressFill");
        var progressBuffer = document.getElementById("progressBuffer");
        var progressThumb  = document.getElementById("progressThumb");
        var timeDisplay    = document.getElementById("timeDisplay");
        var fullscreenBtn  = document.getElementById("fullscreenBtn");
        var settingsBtn    = document.getElementById("settingsBtn");
        var settingsMenu   = document.getElementById("settingsMenu");
        var videoControls  = document.getElementById("videoControls");
        var speedMenuToggle  = document.getElementById("speedMenuToggle");
        var speedOptions   = document.getElementById("speedOptions");
        var currentSpeedLabel = document.getElementById("currentSpeedLabel");

        // Set video source
        source.src = "https://861087038.tapecontent.net/radosgw/AlvW01XLY9iXyO8/mXgUstAtXwRofJbBdxkeiSC3TeIzzpQb0v5ZhkEPrHzreLBXyvT9hStzSAkTm-j7_jjiehsqDotnY0ONtxurKNyXEQ_HWq_3krTQjP40z5Sw7_xcLPE6jvl4kQZaZh0bj-ttRdm8zNcTtUPjM9_FZsJmLc_iP2q4OCdLyYaVgoreKszlTtMU0Pwp3Mimm0aXkzov5BFC--G55yB6cig0XkF_WSnRRXbUgjWlKq-S5Bvd5aCmG7AYMoEN5_n_RhLhgMCF95a8lmW5_yc91bk6py60AYfEfRlY9Xe4ePdoazTGt0daXc20bSQ3chV8JUZvyRrWFeYJa78AvauW/Cara+Meminum+Ramune+-++17+Mei+2026.mp4?stream=1";
        video.load();

        // ---- Helpers ----
        function formatTime(s) {
            if (isNaN(s) || s < 0) return "0:00";
            var h = Math.floor(s / 3600);
            var m = Math.floor((s % 3600) / 60);
            var sec = Math.floor(s % 60);
            return (h > 0 ? h + ":" + (m < 10 ? "0" : "") : "") + m + ":" + (sec < 10 ? "0" : "") + sec;
        }

        function updateVolumeIcon() {
            var v = video.volume;
            var muted = video.muted || v === 0;
            volumeSlider.value = muted ? 0 : v * 100;
            if (muted || v === 0) {
                volumeBtn.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>';
            } else if (v < 0.5) {
                volumeBtn.innerHTML = '<i class="fa-solid fa-volume-low"></i>';
            } else {
                volumeBtn.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
            }
        }

        var lastVolume = 1; // remember volume before mute

        // ---- Play / Pause ----
        playPauseBtn.addEventListener("click", function(e) {
            e.stopPropagation();
            video.paused ? video.play().catch(function(){}) : video.pause();
        });

        video.addEventListener("play", function() {
            playPauseBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
        });
        video.addEventListener("pause", function() {
            playPauseBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
        });

        // ---- Skip ----
        skipBackBtn.addEventListener("click", function(e) {
            e.stopPropagation();
            video.currentTime = Math.max(0, video.currentTime - 10);
        });
        skipFwdBtn.addEventListener("click", function(e) {
            e.stopPropagation();
            video.currentTime = Math.min(video.duration || 0, video.currentTime + 10);
        });

        // ---- Volume ----
        volumeBtn.addEventListener("click", function(e) {
            e.stopPropagation();
            if (video.muted || video.volume === 0) {
                // Unmute
                video.muted = false;
                video.volume = lastVolume > 0 ? lastVolume : 0.5;
                volumeSlider.value = video.volume * 100;
            } else {
                // Mute
                lastVolume = video.volume;
                video.muted = true;
                volumeSlider.value = 0;
            }
            updateVolumeIcon();
        });

        volumeSlider.addEventListener("input", function(e) {
            e.stopPropagation();
            var val = this.value / 100;
            video.volume = val;
            video.muted = val === 0;
            if (val > 0) lastVolume = val;
            updateVolumeIcon();
        });

        // Show/hide volume slider on mobile tap
        volumeBtn.addEventListener("touchend", function(e) {
            e.preventDefault();
            e.stopPropagation();
            volumeWrap.classList.toggle("expanded");
        });

        video.addEventListener("volumechange", updateVolumeIcon);

        // ---- Progress bar ----
        var isSeeking = false;

        function seekTo(e) {
            var rect = progressWrap.getBoundingClientRect();
            var clientX = e.touches ? e.touches[0].clientX : e.clientX;
            var pct = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
            if (!isNaN(video.duration)) {
                video.currentTime = pct * video.duration;
            }
            progressFill.style.width = (pct * 100) + "%";
            progressThumb.style.left = (pct * 100) + "%";
        }

        progressWrap.addEventListener("mousedown", function(e) {
            e.stopPropagation();
            isSeeking = true;
            seekTo(e);
        });
        progressWrap.addEventListener("touchstart", function(e) {
            e.stopPropagation();
            isSeeking = true;
            seekTo(e);
        }, { passive: true });

        document.addEventListener("mousemove", function(e) {
            if (isSeeking) seekTo(e);
        });
        document.addEventListener("touchmove", function(e) {
            if (isSeeking) seekTo(e);
        }, { passive: true });
        document.addEventListener("mouseup", function() { isSeeking = false; });
        document.addEventListener("touchend", function() { isSeeking = false; });

        video.addEventListener("timeupdate", function() {
            if (isSeeking) return;
            var pct = video.duration ? (video.currentTime / video.duration) * 100 : 0;
            progressFill.style.width = pct + "%";
            progressThumb.style.left = pct + "%";
            timeDisplay.textContent = formatTime(video.currentTime) + " / " + formatTime(video.duration);
        });

        // Buffered progress
        video.addEventListener("progress", function() {
            if (video.buffered.length && video.duration) {
                var bufferedEnd = video.buffered.end(video.buffered.length - 1);
                progressBuffer.style.width = (bufferedEnd / video.duration * 100) + "%";
            }
        });

        // ---- Settings menu ----
        settingsBtn.addEventListener("click", function(e) {
            e.stopPropagation();
            settingsMenu.classList.toggle("open");
        });

        // Speed submenu
        speedMenuToggle.addEventListener("click", function(e) {
            e.stopPropagation();
            speedOptions.classList.toggle("open");
        });

        document.querySelectorAll(".speed-option").forEach(function(opt) {
            opt.addEventListener("click", function(e) {
                e.stopPropagation();
                var speed = parseFloat(this.dataset.speed);
                video.playbackRate = speed;
                currentSpeedLabel.textContent = speed === 1 ? "1×" : speed + "×";
                document.querySelectorAll(".speed-option").forEach(function(o) {
                    o.classList.remove("active");
                });
                this.classList.add("active");
                speedOptions.classList.remove("open");
                settingsMenu.classList.remove("open");
            });
        });

        // Close settings on outside click
        document.addEventListener("click", function(e) {
            if (!settingsMenu.contains(e.target) && e.target !== settingsBtn) {
                settingsMenu.classList.remove("open");
                speedOptions.classList.remove("open");
            }
        });

        // ---- Fullscreen ----
        fullscreenBtn.addEventListener("click", function(e) {
            e.stopPropagation();
            var inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
            if (inFs) {
                (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen).call(document);
            } else {
                // Try playerStage first, fallback to video (iOS)
                var el = playerStage;
                if (el.requestFullscreen) {
                    el.requestFullscreen();
                } else if (el.webkitRequestFullscreen) {
                    el.webkitRequestFullscreen();
                } else if (el.mozRequestFullScreen) {
                    el.mozRequestFullScreen();
                } else if (video.webkitEnterFullscreen) {
                    // iOS Safari fallback
                    video.webkitEnterFullscreen();
                }
            }
        });

        function updateFullscreenIcon() {
            var inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
            fullscreenBtn.innerHTML = inFs
                ? '<i class="fa-solid fa-compress"></i>'
                : '<i class="fa-solid fa-expand"></i>';
        }
        document.addEventListener("fullscreenchange", updateFullscreenIcon);
        document.addEventListener("webkitfullscreenchange", updateFullscreenIcon);

        // ---- Controls visibility ----
        var hideControlsTimer;
        function showControls() {
            videoControls.classList.add("visible");
            clearTimeout(hideControlsTimer);
            if (!video.paused) {
                hideControlsTimer = setTimeout(function() {
                    videoControls.classList.remove("visible");
                }, 3000);
            }
        }
        playerStage.addEventListener("mousemove", showControls);
        playerStage.addEventListener("touchstart", showControls, { passive: true });
        playerStage.addEventListener("mouseleave", function() {
            if (!video.paused) {
                clearTimeout(hideControlsTimer);
                videoControls.classList.remove("visible");
            }
        });
        // Always show controls when paused
        video.addEventListener("pause", function() {
            videoControls.classList.add("visible");
            clearTimeout(hideControlsTimer);
        });
        video.addEventListener("play", function() {
            // Start hide timer
            hideControlsTimer = setTimeout(function() {
                videoControls.classList.remove("visible");
            }, 3000);
        });

        // Tap on video to toggle play/pause (mobile)
        video.addEventListener("click", function(e) {
            e.stopPropagation();
            showControls();
            video.paused ? video.play().catch(function(){}) : video.pause();
        });

        // ---- Overlay ----
        var overlayGone = false;
        function hideOverlay() {
            if (overlayGone) return;
            overlayGone = true;
            overlay.classList.add("hidden");
            setTimeout(function() {
                if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
            }, 300);
        }
        video.addEventListener("play", hideOverlay);

        overlayBtn.addEventListener("click", function(e) {
            e.stopPropagation();
            bukaIklan();
            video.play().catch(function() {});
        });

        playerStage.addEventListener("click", function(e) {
            if (e.target.closest('video')) return;
            bukaIklan();
        });

        // Mobile tap target fullscreen
        if (mobileTap) {
            mobileTap.addEventListener("touchend", function() { bukaIklan(); }, { passive: true });
            mobileTap.addEventListener("click", function() { bukaIklan(); });
        }

        function onFsChange() {
            var inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
            if (inFs) bukaIklan();
            var isMobile = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768;
            if (mobileTap) mobileTap.style.display = (isMobile && inFs) ? 'block' : 'none';
        }
        document.addEventListener("fullscreenchange", onFsChange);
        document.addEventListener("webkitfullscreenchange", onFsChange);
        document.addEventListener("mozfullscreenchange", onFsChange);

        // ---- Keyboard shortcuts ----
        document.addEventListener('keydown', function(e) {
            if (document.activeElement.tagName === 'INPUT') return;
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault();
                video.paused ? video.play().catch(function(){}) : video.pause();
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                video.currentTime = Math.min(video.duration || 0, video.currentTime + 10);
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                video.currentTime = Math.max(0, video.currentTime - 10);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                video.volume = Math.min(1, video.volume + 0.1);
                updateVolumeIcon();
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                video.volume = Math.max(0, video.volume - 0.1);
                updateVolumeIcon();
            } else if (e.key === 'm' || e.key === 'M') {
                video.muted = !video.muted;
                updateVolumeIcon();
            } else if (e.key === 'f' || e.key === 'F') {
                fullscreenBtn.click();
            }
        }, true);
    });

    // =============================================
    // BLOKIR DEVTOOLS (desktop only)
    // =============================================
    if (!(/Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768)) {
        var devToolsOpen = false;
        function detectDevTools() {
            var wd = window.outerWidth - window.innerWidth;
            var hd = window.outerHeight - window.innerHeight;
            if ((wd > 160 || hd > 160) && !devToolsOpen) {
                devToolsOpen = true;
                document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0f172a;color:white;font-family:system-ui;text-align:center;padding:20px;"><div><h1 style="font-size:2rem;margin-bottom:1rem;">🚫 Mau ngapain?</h1><p>Developer tools terdeteksi.</p></div></div>';
                setTimeout(function() { window.location.href = 'https://www.youtube.com/watch?v=4ckrU8qqblY'; }, 800);
            }
        }
        function blockDevToolsKeys(e) {
            var blocked = [
                e.key === 'F12' || e.keyCode === 123,
                (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key)),
                (e.metaKey && e.altKey && ['I','J','C'].includes(e.key)),
                (e.ctrlKey || e.metaKey) && e.key === 'U'
            ];
            if (blocked.some(Boolean)) {
                e.preventDefault();
                e.stopImmediatePropagation();
                return false;
            }
        }
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        document.addEventListener('keydown', blockDevToolsKeys, true);
        window.addEventListener('keydown', blockDevToolsKeys, true);
        setInterval(detectDevTools, 500);
    }

    // =============================================
    // WATERMARK
    // =============================================
    var watermark = document.getElementById('watermark');
    var SHOW_DURATION = 10000;
    var HIDE_DURATION = 3 * 60 * 1000;
    var wmHideTimeout, wmShowTimeout, isWmActive = false;

    function applyResponsiveStyle() {
        var inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
        watermark.style.fontSize = inFs ? '1.4rem' : '0.85rem';
    }
    function getRandomPosition() {
        var margin = 10;
        return {
            x: margin + Math.random() * (80 - margin),
            y: margin + Math.random() * (80 - margin)
        };
    }
    function positionWatermark() {
        var pos = getRandomPosition();
        watermark.style.left = pos.x + '%';
        watermark.style.top  = pos.y + '%';
    }
    function showWatermark() {
        if (!watermark) return;
        applyResponsiveStyle();
        positionWatermark();
        watermark.style.display = 'block';
        isWmActive = true;
        wmHideTimeout = setTimeout(function() {
            watermark.style.display = 'none';
            isWmActive = false;
            wmShowTimeout = setTimeout(showWatermark, HIDE_DURATION);
        }, SHOW_DURATION);
    }
    function onFsChangeWatermark() {
        var inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
        if (inFs) {
            clearTimeout(wmHideTimeout);
            clearTimeout(wmShowTimeout);
            showWatermark();
        }
    }
    document.addEventListener('fullscreenchange', onFsChangeWatermark);
    document.addEventListener('webkitfullscreenchange', onFsChangeWatermark);
    document.addEventListener('mozfullscreenchange', onFsChangeWatermark);
    window.addEventListener('resize', function() {
        if (isWmActive) { applyResponsiveStyle(); positionWatermark(); }
    });

    showWatermark();
    </script>
</body>
</html>
