<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .video-wrapper {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        video {
            width: 100%;
            height: auto;
            display: block;
            background: #000;
        }

        .video-info {
            background: #fff;
            padding: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .video-info h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .video-info p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .video-info h1 {
                font-size: 18px;
            }

            .video-info p {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="video-wrapper">
            <video 
                controls 
                preload="metadata"
                controlsList="nodownload"
                poster="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1280 720'%3E%3Crect fill='%23000' width='1280' height='720'/%3E%3C/svg%3E">

                    type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        <div class="video-info">
            <h1>Cara Meminum Ramune</h1>
            <p>Video diproduksi pada 17 Mei 2026. Nikmati penjelasan lengkap tentang cara meminum minuman tradisional Jepang yang unik dan menyenangkan ini.</p>
        </div>
    </div>
</body>
</html>
