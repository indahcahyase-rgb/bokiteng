<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arena Replay</title>
    <link rel="icon" type="image/x-icon" href="https://www.idn.app/img/logo-idn.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.vidstack.io/player/theme.css" />
    <link rel="stylesheet" href="https://cdn.vidstack.io/player/video.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap');
        body { font-family: "Atkinson Hyperlegible", sans-serif; }
        .player-stage { position: relative; background: #000; aspect-ratio: 16 / 9; }
        .player-overlay {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(180deg, rgba(20,23,26,0.18) 0%, rgba(20,23,26,0.78) 100%);
            transition: opacity 0.25s ease, visibility 0.25s ease; z-index: 20;
        }
        .player-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .overlay-play {
            width: 78px; height: 78px; border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.25); background: rgba(239,68,68,0.92);
            color: #fff; font-size: 1.8rem; box-shadow: 0 24px 50px rgba(0,0,0,0.35);
            transition: all 0.2s ease; cursor: pointer;
        }
        .overlay-play:hover { transform: scale(1.08); background: rgba(220,38,38,0.98); }
        .iklan-box {
            background: #2c2e31;
            border: 2px dashed #f97316;
            border-radius: 16px;
            padding: 16px;
            margin-top: 20px;
            text-align: center;
            color: #fbbf24;
            font-weight: 600;
        }
        #mobileTapTarget {
            display: none;
            position: absolute;
            left: 20%;
            top: 25%;
            width: 60%;
            height: 50%;
            z-index: 2147483646;
        }
        #watermark {
            position: absolute;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.6);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            z-index: 2147483647;
            user-select: none;
            white-space: nowrap;
        }
        #replayVideo {
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
            position: absolute;
            inset: 0;
        }

        /* ── Custom Controls (IDN/vidstack style) ── */
        .vds-controls {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, transparent 100%);
            padding: 32px 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 30;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .player-stage:hover .vds-controls,
        .vds-controls.show {
            opacity: 1;
            pointer-events: all;
        }
        /* Progress / seek bar */
        .vds-progress-wrap {
            width: 100%;
            cursor: pointer;
            padding: 6px 0;
        }
        .vds-progress-track {
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.25);
            border-radius: 99px;
            position: relative;
            transition: height 0.15s ease;
        }
        .vds-progress-wrap:hover .vds-progress-track { height: 5px; }
        .vds-progress-fill {
            height: 100%;
            background: #ef4444;
            border-radius: 99px;
            width: 0%;
            position: relative;
        }
        .vds-progress-fill::after {
            content: '';
            position: absolute;
            right: -5px; top: 50%;
            transform: translateY(-50%);
            width: 11px; height: 11px;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .vds-progress-wrap:hover .vds-progress-fill::after { opacity: 1; }

        /* Bottom row */
        .vds-bottom-row {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .vds-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 15px;
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 6px;
            transition: background 0.15s;
            flex-shrink: 0;
        }
        .vds-btn:hover { background: rgba(255,255,255,0.12); }
        .vds-time {
            color: rgba(255,255,255,0.85);
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            padding: 0 6px;
            letter-spacing: 0.02em;
        }
        .vds-spacer { flex: 1; }
        /* Volume */
        .vds-volume-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .vds-vol-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 64px;
            height: 3px;
            background: rgba(255,255,255,0.25);
            border-radius: 99px;
            outline: none;
            cursor: pointer;
        }
        .vds-vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 11px; height: 11px;
            background: #fff;
            border-radius: 50%;
        }
        .vds-vol-slider::-moz-range-thumb {
            width: 11px; height: 11px;
            background: #fff;
            border-radius: 50%;
            border: none;
        }

        /* Fullscreen: video fills container */
        :fullscreen #replayVideo,
        :-webkit-full-screen #replayVideo {
            width: 100%; height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body class="bg-[#14171a] text-gray-300 flex flex-col min-h-screen">
    <header class="bg-[#2c2e31] border-b border-gray-700 sticky top-0 z-30">
        <div class="flex items-center justify-between gap-3 max-w-7xl mx-auto px-4 py-3">
            <a href="#"><img src="https://www.idn.app/_next/static/media/logo_light.d99f40cc.svg" alt="IDN Live" class="h-9"></a>
        </div>
    </header>

    <main class="max-w-5xl mx-auto w-full p-4">
        <div class="player-shell rounded-[28px] overflow-hidden border border-gray-800 shadow-2xl">
            <div class="player-stage" id="playerStage">

                <!-- VIDEO — src langsung di HTML, tanpa JS set src -->
                <video
                    id="replayVideo"
                    preload="metadata"
                    playsinline
                    controlsList="nodownload"
                    poster="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1280 720'%3E%3Crect fill='%23000' width='1280' height='720'/%3E%3C/svg%3E">
                    <source
                        src="https://861087038.tapecontent.net/radosgw/AlvW01XLY9iXyO8/mXgUstAtXwRofJbBdxkeiSC3TeIzzpQb0v5ZhkEPrHzreLBXyvT9hStzSAkTm-j7_jjiehsqDotnY0ONtxurNKyEQ_HWq_3krTQjP40z5Sw7_xcLPE6jvl4kQZaZh0bj-ttRdm8zNcTtUPjM9_FZsJmLc_iP2q4OCdLyYaVgoreKszlTtMU0Pwp3Mimm0aXkzov5BFC--G55yB6cig0XkF_WSnRRXbUgjWlKq-S5Bvd5aCmG7AYMoEN5_n_RhLhgMCF95a8lmW5_yc91bk6py60AYfEfRlY9Xe4ePdoazTGt0daXc20bSQ3chV8JUZvyRrWFeYJa78AvauW/Cara+Meminum+Ramune+-++17+Mei+2026.mp4?stream=1"
                        type="video/mp4">
                    Browser Anda tidak mendukung video.
                </video>

                <!-- Custom Controls (IDN style) -->
                <div class="vds-controls" id="vdsControls">
                    <!-- Seek bar -->
                    <div class="vds-progress-wrap" id="progressWrap">
                        <div class="vds-progress-track">
                            <div class="vds-progress-fill" id="progressFill"></div>
                        </div>
                    </div>
                    <!-- Bottom row -->
                    <div class="vds-bottom-row">
                        <!-- Play/Pause -->
                        <button class="vds-btn" id="playPauseBtn" title="Play / Pause">
                            <i class="fa-solid fa-play"></i>
                        </button>
                        <!-- Volume -->
                        <div class="vds-volume-wrap">
                            <button class="vds-btn" id="volumeBtn" title="Volume">
                                <i class="fa-solid fa-volume-high"></i>
                            </button>
                            <input type="range" class="vds-vol-slider" id="volSlider" min="0" max="100" value="100">
                        </div>
                        <!-- Time -->
                        <span class="vds-time" id="timeDisplay">0:00 / 0:00</span>
                        <div class="vds-spacer"></div>
                        <!-- Fullscreen -->
                        <button class="vds-btn" id="fullscreenBtn" title="Fullscreen">
                            <i class="fa-solid fa-expand"></i>
                        </button>
                    </div>
                </div>

                <div id="mobileTapTarget"></div>
                <div id="watermark" style="display:none;">arenareplay.my.id</div>

                <div id="playerOverlay" class="player-overlay">
                    <button id="overlayPlayButton" class="overlay-play">
                        <i class="fa-solid fa-play"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="mt-5 px-1">
            <p class="uppercase tracking-[0.3em] text-[11px] text-red-400 font-bold">REPLAY READY</p>
            <h1 class="text-white text-3xl font-bold">Cara Meminum Ramune</h1>
            <p class="text-gray-400 text-sm">17 Mei 2026</p>
        </div>
        <div class="iklan-box">
            <a href="https://arenareplay.my.id/" target="_blank">
                <img src="https://i.ibb.co/xSGYwHfv/pasang-iklan-mu-disini-1.png" alt="PASANG IKLAN DISINI" class="w-full h-auto rounded-md">
            </a>
        </div>
    </main>

    <script>
    // ── IKLAN ──────────────────────────────────────
    var adLinks = [
        "https://s.shopee.co.id/9zuR1ePkSi",
        "https://s.shopee.co.id/1qYjImVxbO",
        "https://s.shopee.co.id/8piTdhtvyy",
        "https://s.shopee.co.id/7KtfqzlEXv",
        "https://s.shopee.co.id/gMlupq6qE"
    ];
    var adDelay = 180000;
    localStorage.removeItem("lastAdOpen");

    function bukaIklan() {
        var last = localStorage.getItem("lastAdOpen");
        var now  = Date.now();
        if (!last || (now - parseInt(last)) > adDelay) {
            window.open(adLinks[Math.floor(Math.random() * adLinks.length)], "_blank");
            localStorage.setItem("lastAdOpen", now);
        }
    }

    document.addEventListener("click", function(e) {
        if (e.target.closest("video") || e.target.closest("a") || e.target.closest(".iklan-box") ||
            e.target.closest(".vds-controls") || e.target.closest("#playerOverlay")) return;
        bukaIklan();
    });

    // ── VIDEO & CONTROLS ───────────────────────────
    document.addEventListener("DOMContentLoaded", function () {
        var video        = document.getElementById("replayVideo");
        var overlay      = document.getElementById("playerOverlay");
        var overlayBtn   = document.getElementById("overlayPlayButton");
        var mobileTap    = document.getElementById("mobileTapTarget");
        var playerStage  = document.getElementById("playerStage");
        var controls     = document.getElementById("vdsControls");

        var playPauseBtn = document.getElementById("playPauseBtn");
        var volumeBtn    = document.getElementById("volumeBtn");
        var volSlider    = document.getElementById("volSlider");
        var progressWrap = document.getElementById("progressWrap");
        var progressFill = document.getElementById("progressFill");
        var timeDisplay  = document.getElementById("timeDisplay");
        var fullscreenBtn= document.getElementById("fullscreenBtn");

        // ── Format waktu ──
        function fmt(s) {
            if (isNaN(s) || s < 0) return "0:00";
            var h = Math.floor(s / 3600),
                m = Math.floor((s % 3600) / 60),
                sec = Math.floor(s % 60);
            return (h ? h + ":" + (m < 10 ? "0" : "") : "") + m + ":" + (sec < 10 ? "0" : "") + sec;
        }

        // ── Play / Pause ──
        function syncPlayIcon() {
            playPauseBtn.innerHTML = video.paused
                ? '<i class="fa-solid fa-play"></i>'
                : '<i class="fa-solid fa-pause"></i>';
        }
        playPauseBtn.addEventListener("click", function () {
            video.paused ? video.play().catch(function(){}) : video.pause();
        });
        video.addEventListener("play",  syncPlayIcon);
        video.addEventListener("pause", syncPlayIcon);

        // ── Volume ──
        function syncVolIcon() {
            volSlider.value = Math.round(video.volume * 100);
            volumeBtn.innerHTML = video.volume === 0
                ? '<i class="fa-solid fa-volume-xmark"></i>'
                : video.volume < 0.5
                    ? '<i class="fa-solid fa-volume-low"></i>'
                    : '<i class="fa-solid fa-volume-high"></i>';
        }
        volumeBtn.addEventListener("click", function () {
            video.volume = video.volume > 0 ? 0 : (volSlider.value / 100 || 1);
            syncVolIcon();
        });
        volSlider.addEventListener("input", function () {
            video.volume = this.value / 100;
            syncVolIcon();
        });

        // ── Progress / Time ──
        video.addEventListener("timeupdate", function () {
            if (video.duration) {
                progressFill.style.width = (video.currentTime / video.duration * 100) + "%";
                timeDisplay.textContent  = fmt(video.currentTime) + " / " + fmt(video.duration);
            }
        });
        progressWrap.addEventListener("click", function (e) {
            var rect = progressWrap.getBoundingClientRect();
            video.currentTime = ((e.clientX - rect.left) / rect.width) * video.duration;
        });

        // ── Fullscreen ──
        fullscreenBtn.addEventListener("click", function () {
            var el = playerStage;
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen).call(el);
            } else {
                (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen).call(document);
            }
        });
        function syncFsIcon() {
            var inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
            fullscreenBtn.innerHTML = inFs
                ? '<i class="fa-solid fa-compress"></i>'
                : '<i class="fa-solid fa-expand"></i>';
        }
        document.addEventListener("fullscreenchange",       syncFsIcon);
        document.addEventListener("webkitfullscreenchange", syncFsIcon);

        // ── Auto-hide controls ──
        var hideTimer;
        function showControls() {
            controls.classList.add("show");
            clearTimeout(hideTimer);
            if (!video.paused) hideTimer = setTimeout(function(){ controls.classList.remove("show"); }, 3000);
        }
        playerStage.addEventListener("mousemove",  showControls);
        playerStage.addEventListener("touchstart", showControls, { passive: true });
        playerStage.addEventListener("mouseleave", function () {
            if (!video.paused) controls.classList.remove("show");
        });
        video.addEventListener("pause", function () { controls.classList.add("show"); clearTimeout(hideTimer); });
        video.addEventListener("play",  function () { showControls(); });

        // ── Overlay ──
        var overlayGone = false;
        function hideOverlay() {
            if (overlayGone) return;
            overlayGone = true;
            overlay.classList.add("hidden");
            setTimeout(function () { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 300);
        }
        video.addEventListener("play", hideOverlay);
        overlayBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            bukaIklan();
            video.play().catch(function(){});
        });

        // ── Mobile tap target ──
        if (mobileTap) {
            mobileTap.addEventListener("touchend", function(){ bukaIklan(); }, { passive: true });
            mobileTap.addEventListener("click",    function(){ bukaIklan(); });
        }

        // ── Fullscreen → iklan + mobile tap ──
        function onFsChange() {
            var inFs   = !!(document.fullscreenElement || document.webkitFullscreenElement);
            var mobile = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768;
            if (inFs) bukaIklan();
            if (mobileTap) mobileTap.style.display = (mobile && inFs) ? "block" : "none";
        }
        document.addEventListener("fullscreenchange",       onFsChange);
        document.addEventListener("webkitfullscreenchange", onFsChange);
        document.addEventListener("mozfullscreenchange",    onFsChange);

        // ── Keyboard space ──
        document.addEventListener("keydown", function (e) {
            if ((e.code === "Space" || e.key === " ") && document.activeElement.tagName !== "INPUT") {
                e.preventDefault();
                video.paused ? video.play().catch(function(){}) : video.pause();
            }
        }, true);
    });

    // ── BLOKIR DEVTOOLS ────────────────────────────
    if (!(/Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768)) {
        var devOpen = false;
        function detectDevTools() {
            var wd = window.outerWidth - window.innerWidth;
            var hd = window.outerHeight - window.innerHeight;
            if ((wd > 160 || hd > 160) && !devOpen) {
                devOpen = true;
                document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0f172a;color:white;font-family:system-ui;text-align:center;padding:20px;"><div><h1 style="font-size:2rem;margin-bottom:1rem;">🚫 Mau ngapain?</h1><p>Developer tools terdeteksi.</p></div></div>';
                setTimeout(function(){ window.location.href = "https://www.youtube.com/watch?v=4ckrU8qqblY"; }, 800);
            }
        }
        function blockKeys(e) {
            var b = [
                e.key === "F12" || e.keyCode === 123,
                e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key),
                e.metaKey && e.altKey  && ["I","J","C"].includes(e.key),
                (e.ctrlKey || e.metaKey) && e.key === "U"
            ];
            if (b.some(Boolean)) { e.preventDefault(); e.stopImmediatePropagation(); return false; }
        }
        document.addEventListener("contextmenu", function(e){ e.preventDefault(); });
        document.addEventListener("keydown", blockKeys, true);
        window.addEventListener("keydown",   blockKeys, true);
        setInterval(detectDevTools, 500);
    }

    // ── WATERMARK ──────────────────────────────────
    var watermark    = document.getElementById("watermark");
    var SHOW_DUR     = 10000;
    var HIDE_DUR     = 3 * 60 * 1000;
    var wmHideT, wmShowT, wmActive = false;

    function applyWmStyle() {
        watermark.style.fontSize = !!(document.fullscreenElement || document.webkitFullscreenElement) ? "1.4rem" : "0.85rem";
    }
    function positionWm() {
        watermark.style.left = (10 + Math.random() * 70) + "%";
        watermark.style.top  = (10 + Math.random() * 70) + "%";
    }
    function showWm() {
        if (!watermark) return;
        applyWmStyle(); positionWm();
        watermark.style.display = "block";
        wmActive = true;
        wmHideT = setTimeout(function(){
            watermark.style.display = "none";
            wmActive = false;
            wmShowT = setTimeout(showWm, HIDE_DUR);
        }, SHOW_DUR);
    }
    function onFsWm() {
        if (!!(document.fullscreenElement || document.webkitFullscreenElement)) {
            clearTimeout(wmHideT); clearTimeout(wmShowT); showWm();
        }
    }
    document.addEventListener("fullscreenchange",       onFsWm);
    document.addEventListener("webkitfullscreenchange", onFsWm);
    document.addEventListener("mozfullscreenchange",    onFsWm);
    window.addEventListener("resize", function(){ if (wmActive){ applyWmStyle(); positionWm(); } });
    showWm();
    </script>
</body>
</html>
